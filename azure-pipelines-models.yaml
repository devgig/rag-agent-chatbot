trigger:
  branches:
    include:
      - main
  paths:
    include:
      - kustomize/models/**

pr:
  branches:
    include:
      - main
  paths:
    include:
      - kustomize/models/**

resources:
- repo: self

variables:
  system.debug: false
  namespace: 'multi-agent-dev'
  poolName: '$(buildAgentPool)'

stages:
- stage: ValidateAndPublish
  displayName: Validate and Publish KAITO Manifests
  pool:
    name: $(poolName)
  jobs:
  - job: Validate
    displayName: Validate YAML syntax
    steps:
      - task: Bash@3
        displayName: Validate KAITO manifests with kustomize
        inputs:
          targetType: 'inline'
          script: |
            # Build kustomize manifests for dev overlay
            kubectl kustomize kustomize/models/overlays/dev > /tmp/models-manifests.yaml || {
              echo "❌ Kustomize build failed"
              exit 1
            }

            echo "✅ Kustomize build passed"

  - job: PublishManifest
    displayName: Publish manifests
    dependsOn: Validate
    steps:
      - task: Bash@3
        displayName: Generate manifests for dev
        inputs:
          targetType: 'inline'
          script: |
            mkdir manifests
            if [ -d "./kustomize/models/overlays/dev" ]; then
              kubectl kustomize ./kustomize/models/overlays/dev > ./manifests/models-dev-workloads.yaml
            else
              echo "dev overlay doesn't exist; skipping"
            fi

            if [ -d "./kustomize/models/overlays/prod" ]; then
              kubectl kustomize ./kustomize/models/overlays/prod > ./manifests/models-prod-workloads.yaml
            else
              echo "prod overlay doesn't exist; skipping"
            fi

      - publish: 'manifests'
        artifact: manifests

- stage: DeployToKubernetes
  displayName: Deploy KAITO Workspace
  dependsOn: ValidateAndPublish
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  pool:
    name: $(poolName)
  jobs:
  - job: DeployKAITO
    displayName: Deploy gpt-oss-120b workspace
    steps:
      - checkout: self

      - task: Bash@3
        displayName: Check for existing workspace
        inputs:
          targetType: 'inline'
          script: |
            # Check if workspace already exists
            if kubectl get workspace gpt-oss-120b -n $(namespace) >/dev/null 2>&1; then
              echo "⚠️ Workspace gpt-oss-120b already exists"
              echo "Updating existing workspace..."
            else
              echo "✅ Creating new workspace gpt-oss-120b"
            fi

      - task: Bash@3
        displayName: Generate manifests with kustomize
        inputs:
          targetType: 'inline'
          script: |
            # Generate kustomize manifests for dev overlay
            mkdir -p manifests
            kubectl kustomize kustomize/models/overlays/dev > manifests/models-dev-workloads.yaml

            echo "Generated manifests:"
            cat manifests/models-dev-workloads.yaml

      - task: Bash@3
        displayName: Deploy KAITO workspace with kubectl
        inputs:
          targetType: 'inline'
          script: |
            # Deploy using kubectl apply
            kubectl apply -f manifests/models-dev-workloads.yaml
            echo "✅ KAITO workspace deployed"

      - task: Bash@3
        displayName: Wait for HuggingFace secret sync
        inputs:
          targetType: 'inline'
          script: |
            echo "Waiting for ExternalSecret to sync HuggingFace token..."
            kubectl wait --for=condition=Ready externalsecret/hf-external-secret \
              -n $(namespace) \
              --timeout=60s || {
              echo "⚠️ ExternalSecret not ready. Check Azure Key Vault configuration."
              exit 1
            }
            echo "✅ HuggingFace credentials synced"

      - task: Bash@3
        displayName: Monitor workspace deployment
        inputs:
          targetType: 'inline'
          script: |
            echo "Waiting for workspace to be ready (timeout: 5 minutes)..."
            kubectl wait --for=condition=WorkspaceReady workspace/gpt-oss-120b \
              -n $(namespace) \
              --timeout=300s || {
              echo "⚠️ Workspace not ready after 5 minutes. This is expected for first deployment."
              echo "Model download can take 10-20 minutes. Check progress with:"
              echo "  kubectl get workspace gpt-oss-120b -n $(namespace) -w"
              echo "  kubectl logs -n $(namespace) -l workspace=gpt-oss-120b -f"
            }

      - task: Bash@3
        displayName: Display deployment status
        inputs:
          targetType: 'inline'
          script: |
            echo "📊 Deployment Status:"
            echo "===================="
            kubectl get workspace gpt-oss-120b -n $(namespace) || true
            echo ""
            echo "📦 Pods:"
            kubectl get pods -n $(namespace) -l workspace=gpt-oss-120b || true
            echo ""
            echo "🔌 Service:"
            kubectl get svc gpt-oss-120b -n $(namespace) || true
            echo ""
            echo "💡 To monitor progress:"
            echo "   kubectl get workspace gpt-oss-120b -n $(namespace) -w"
            echo "   kubectl logs -n $(namespace) -l workspace=gpt-oss-120b -f"
