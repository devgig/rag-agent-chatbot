trigger:
  branches:
    include:
      - main
  paths:
    include:
      - assets/embedding/**
      - kustomize/models/**

pr:
  branches:
    include:
      - main
  paths:
    include:
      - assets/embedding/**
      - kustomize/models/**

resources:
- repo: self

variables:
  system.debug: false
  imageRepository: 'rag-agent-chatbot-embedding'
  containerRegistry: 'acr-bytecourier'
  containerRegistryUrl: 'bytecourier.azurecr.io'
  dockerfilePath: './assets/embedding/Dockerfile'
  tag: '$(Build.SourceVersion)'
  namespace: 'rag-agent-dev'
  poolName: '$(buildAgentPool)'

stages:
- stage: BuildEmbeddingImage
  displayName: Build Embedding Image
  pool:
    name: $(poolName)
  jobs:
  - job: BuildAndPush
    displayName: Build and push embedding image to ACR
    steps:
      - checkout: self

      - task: Docker@2
        displayName: Build ARM64 image
        inputs:
          containerRegistry: '$(containerRegistry)'
          repository: '$(imageRepository)'
          command: build
          dockerfile: $(dockerfilePath)
          buildContext: '$(Build.SourcesDirectory)/assets/embedding'
          arguments: '--platform linux/arm64'
          tags: |
            $(tag)
            latest

      - task: Docker@2
        displayName: Push image to ACR
        inputs:
          containerRegistry: '$(containerRegistry)'
          repository: '$(imageRepository)'
          command: push
          tags: |
            $(tag)
            latest

- stage: ValidateAndPublish
  displayName: Validate and Publish Model Manifests
  dependsOn: BuildEmbeddingImage
  pool:
    name: $(poolName)
  jobs:
  - job: Validate
    displayName: Validate YAML syntax
    steps:
      - task: Bash@3
        displayName: Validate KAITO manifests with kustomize
        inputs:
          targetType: 'inline'
          script: |
            # Build kustomize manifests for dev overlay
            kubectl kustomize kustomize/models/overlays/dev > /tmp/models-manifests.yaml || {
              echo "Kustomize build failed"
              exit 1
            }

            echo "Kustomize build passed"

  - job: PublishManifest
    displayName: Publish manifests
    dependsOn: Validate
    steps:
      - task: Bash@3
        displayName: Update embedding image in manifests
        inputs:
          targetType: 'inline'
          script: |
            cd kustomize/models/base
            cat <<EOF >qwen3-embedding-image-patch.yaml
            - op: replace
              path: /spec/template/spec/containers/0/image
              value: bytecourier.azurecr.io/$(imageRepository):$(tag)
            EOF

      - task: Bash@3
        displayName: Generate manifests for dev
        inputs:
          targetType: 'inline'
          script: |
            mkdir manifests
            if [ -d "./kustomize/models/overlays/dev" ]; then
              kubectl kustomize ./kustomize/models/overlays/dev > ./manifests/models-dev-workloads.yaml
            else
              echo "dev overlay doesn't exist; skipping"
            fi

            if [ -d "./kustomize/models/overlays/prod" ]; then
              kubectl kustomize ./kustomize/models/overlays/prod > ./manifests/models-prod-workloads.yaml
            else
              echo "prod overlay doesn't exist; skipping"
            fi

      - publish: 'manifests'
        artifact: manifests
