trigger:
  branches:
    include:
      - main
  paths:
    include:
      - kustomize/models/**

pr:
  branches:
    include:
      - main
  paths:
    include:
      - kustomize/models/**

resources:
- repo: self

variables:
  system.debug: false
  namespace: 'rag-agent-dev'
  poolName: '$(buildAgentPool)'

stages:
- stage: ValidateAndPublish
  displayName: Validate and Publish KAITO Manifests
  pool:
    name: $(poolName)
  jobs:
  - job: Validate
    displayName: Validate YAML syntax
    steps:
      - task: Bash@3
        displayName: Validate KAITO manifests with kustomize
        inputs:
          targetType: 'inline'
          script: |
            # Build kustomize manifests for dev overlay
            kubectl kustomize kustomize/models/overlays/dev > /tmp/models-manifests.yaml || {
              echo "❌ Kustomize build failed"
              exit 1
            }

            echo "✅ Kustomize build passed"

  - job: PublishManifest
    displayName: Publish manifests
    dependsOn: Validate
    steps:
      - task: Bash@3
        displayName: Generate manifests for dev
        inputs:
          targetType: 'inline'
          script: |
            mkdir manifests
            if [ -d "./kustomize/models/overlays/dev" ]; then
              kubectl kustomize ./kustomize/models/overlays/dev > ./manifests/models-dev-workloads.yaml
            else
              echo "dev overlay doesn't exist; skipping"
            fi

            if [ -d "./kustomize/models/overlays/prod" ]; then
              kubectl kustomize ./kustomize/models/overlays/prod > ./manifests/models-prod-workloads.yaml
            else
              echo "prod overlay doesn't exist; skipping"
            fi

      - publish: 'manifests'
        artifact: manifests
