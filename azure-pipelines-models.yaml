trigger:
  branches:
    include:
      - main
  paths:
    include:
      - kustomize/models/**

pr:
  branches:
    include:
      - main
  paths:
    include:
      - kustomize/models/**

resources:
- repo: self

variables:
  system.debug: false
  kubernetesServiceConnection: 'k3s-cluster'
  environment: 'K3s'
  namespace: 'multi-agent-dev'
  poolName: '$(buildAgentPool)'

stages:
- stage: ValidateManifests
  displayName: Validate KAITO Manifests
  pool:
    name: $(poolName)
  jobs:
  - job: Validate
    displayName: Validate YAML syntax
    steps:
      - task: Bash@3
        displayName: Validate KAITO workspace YAML
        inputs:
          targetType: 'inline'
          script: |
            # Validate YAML syntax
            kubectl --dry-run=client apply -f kustomize/models/kaito-workspace.yaml || exit 1
            kubectl --dry-run=client apply -f kustomize/models/kaito-service.yaml || exit 1
            echo "✅ YAML validation passed"

      - task: Bash@3
        displayName: Check KAITO CRD exists
        inputs:
          targetType: 'inline'
          script: |
            # Verify KAITO is installed in cluster
            kubectl api-resources | grep workspace || {
              echo "❌ KAITO CRD not found. Ensure KAITO is installed in cluster."
              exit 1
            }
            echo "✅ KAITO CRD found"

- stage: DeployToKubernetes
  displayName: Deploy KAITO Workspace
  dependsOn: ValidateManifests
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  pool:
    name: $(poolName)
  jobs:
  - deployment: DeployKAITO
    displayName: Deploy gpt-oss-120b workspace
    environment: $(environment)
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self

          - task: Bash@3
            displayName: Check for existing workspace
            inputs:
              targetType: 'inline'
              script: |
                # Check if workspace already exists
                if kubectl get workspace gpt-oss-120b -n $(namespace) >/dev/null 2>&1; then
                  echo "⚠️ Workspace gpt-oss-120b already exists"
                  echo "Updating existing workspace..."
                else
                  echo "✅ Creating new workspace gpt-oss-120b"
                fi

          - task: KubernetesManifest@1
            displayName: Deploy KAITO workspace
            inputs:
              action: 'deploy'
              connectionType: 'kubernetesServiceConnection'
              kubernetesServiceConnection: '$(kubernetesServiceConnection)'
              namespace: '$(namespace)'
              manifests: |
                kustomize/models/kaito-workspace.yaml
                kustomize/models/kaito-service.yaml

          - task: Bash@3
            displayName: Monitor workspace deployment
            inputs:
              targetType: 'inline'
              script: |
                echo "Waiting for workspace to be ready (timeout: 5 minutes)..."
                kubectl wait --for=condition=WorkspaceReady workspace/gpt-oss-120b \
                  -n $(namespace) \
                  --timeout=300s || {
                  echo "⚠️ Workspace not ready after 5 minutes. This is expected for first deployment."
                  echo "Model download can take 10-20 minutes. Check progress with:"
                  echo "  kubectl get workspace gpt-oss-120b -n $(namespace) -w"
                  echo "  kubectl logs -n $(namespace) -l workspace=gpt-oss-120b -f"
                }

          - task: Bash@3
            displayName: Display deployment status
            inputs:
              targetType: 'inline'
              script: |
                echo "📊 Deployment Status:"
                echo "===================="
                kubectl get workspace gpt-oss-120b -n $(namespace) || true
                echo ""
                echo "📦 Pods:"
                kubectl get pods -n $(namespace) -l workspace=gpt-oss-120b || true
                echo ""
                echo "🔌 Service:"
                kubectl get svc gpt-oss-120b -n $(namespace) || true
                echo ""
                echo "💡 To monitor progress:"
                echo "   kubectl get workspace gpt-oss-120b -n $(namespace) -w"
                echo "   kubectl logs -n $(namespace) -l workspace=gpt-oss-120b -f"
