# Authorization Policy at Ingress Gateway
# =========================================
# Enforces JWT requirement for backend API traffic only.
# Scoped to /api/backend-svc paths so frontend and auth traffic pass freely.
# Paths are evaluated BEFORE URLRewrite, so they use the /api/backend-svc prefix.

apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: backend-require-jwt
  namespace: istio-ingress
spec:
  targetRefs:
    - kind: Gateway
      group: gateway.networking.k8s.io
      name: rag-agent-gateway
  action: ALLOW
  rules:
    # Allow all traffic NOT matching /api/backend-svc* without JWT (frontend, auth)
    - to:
        - operation:
            notPaths:
              - /api/backend-svc*
    # Allow unauthenticated access to health check
    - to:
        - operation:
            paths:
              - /api/backend-svc/health
    # Allow unauthenticated WebSocket upgrade (backend validates JWT via first-message auth)
    - to:
        - operation:
            paths:
              - /api/backend-svc/ws/*
    # Authenticated access to all other backend endpoints
    - from:
        - source:
            requestPrincipals: ["*"]
      to:
        - operation:
            paths:
              - /api/backend-svc*
