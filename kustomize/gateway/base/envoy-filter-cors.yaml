# CORS EnvoyFilter at Ingress Gateway
# ====================================
# Ensures CORS headers are present on ALL responses from sparkbackend,
# including gateway-generated errors (403 from AuthorizationPolicy,
# 401 from RequestAuthentication, 503 when backend is unavailable).
#
# Without this, browsers report "CORS error" for any gateway-level failure
# because the response lacks Access-Control-Allow-Origin. The actual backend
# app (FastAPI CORSMiddleware) only adds CORS when requests reach it.
#
# How it works:
# - OPTIONS preflight: Responded to directly at the gateway (never forwarded)
# - Non-preflight: Adds CORS headers only if not already present, avoiding
#   duplicates with FastAPI's CORSMiddleware on successful responses
#
# Filter ordering: INSERT_FIRST ensures this runs before jwt_authn and RBAC,
# so the Origin is captured even when RBAC later denies the request.

apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: backend-cors
  namespace: istio-ingress-dev
spec:
  workloadSelector:
    labels:
      gateway.networking.k8s.io/gateway-name: rag-agent-gateway
  configPatches:
    - applyTo: HTTP_FILTER
      match:
        context: GATEWAY
      patch:
        operation: INSERT_FIRST
        value:
          name: envoy.lua.backend_cors
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
            inlineCode: |
              local allowed = {
                ["http://sparkchat.bytecourier.local"] = true,
                ["http://sparkchat.bytecourier.com"] = true,
                ["https://sparkchat.bytecourier.com"] = true,
                ["http://localhost:3000"] = true,
              }

              function envoy_on_request(request_handle)
                local host = request_handle:headers():get(":authority") or ""
                if not host:find("^sparkbackend%.") then return end

                local origin = request_handle:headers():get("origin")
                if not origin or not allowed[origin] then return end

                -- Handle preflight OPTIONS directly at the gateway
                if request_handle:headers():get(":method") == "OPTIONS"
                   and request_handle:headers():get("access-control-request-method") then
                  request_handle:respond(
                    {[":status"] = "204",
                     ["access-control-allow-origin"] = origin,
                     ["access-control-allow-methods"] = "GET, POST, PUT, DELETE, OPTIONS",
                     ["access-control-allow-headers"] = "authorization, content-type",
                     ["access-control-allow-credentials"] = "true",
                     ["access-control-max-age"] = "86400"},
                    "")
                  return
                end

                -- Save origin for response handler
                request_handle:streamInfo():dynamicMetadata():set("cors", "origin", origin)
              end

              function envoy_on_response(response_handle)
                -- Skip if CORS headers already present (e.g., from FastAPI)
                if response_handle:headers():get("access-control-allow-origin") then return end
                local meta = response_handle:streamInfo():dynamicMetadata():get("cors")
                if meta and meta["origin"] then
                  response_handle:headers():add("access-control-allow-origin", meta["origin"])
                  response_handle:headers():add("access-control-allow-credentials", "true")
                end
              end
