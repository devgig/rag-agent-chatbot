apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- gateway.yaml
# JWT enforcement at ingress gateway (not waypoint) for reliable CORS
- istio-request-authentication.yaml
- istio-authorization-policy.yaml
# CORS at gateway level — ensures headers on error responses (403/401/503)
- envoy-filter-cors.yaml
