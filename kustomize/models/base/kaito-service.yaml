# Service for GPU Model Inference
# ================================
# ClusterIP service exposing vLLM OpenAI-compatible API
# Backend connects via: gpt-oss-120b.rag-agent.svc.cluster.local:8000

apiVersion: v1
kind: Service
metadata:
  name: gpt-oss-120b
  namespace: rag-agent
  labels:
    app: gpt-oss-120b
    managed-by: kaito
spec:
  selector:
    workspace: gpt-oss-120b
  ports:
  - port: 8000
    targetPort: 8000
    name: http
  type: ClusterIP
