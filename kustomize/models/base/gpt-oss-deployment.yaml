apiVersion: apps/v1
kind: Deployment
metadata:
  name: gpt-oss-120b
  namespace: multi-agent-dev
  labels:
    app: gpt-oss-120b
    workspace: gpt-oss-120b
    component: model-inference
    managed-by: kaito
spec:
  replicas: 1
  selector:
    matchLabels:
      workspace: gpt-oss-120b
  template:
    metadata:
      labels:
        workspace: gpt-oss-120b
        app: gpt-oss-120b
    spec:
      nodeSelector:
        nvidia.com/gpu.present: "true"
      tolerations:
      - key: nvidia.com/gpu
        operator: Equal
        value: present
        effect: NoSchedule
      containers:
      - name: vllm-inference
        image: vllm/vllm-openai:latest
        command: ["python3", "-m", "vllm.entrypoints.openai.api_server"]
        args:
        - "--model=microsoft/Phi-3.5-mini-instruct"
        - "--tensor-parallel-size=1"
        - "--gpu-memory-utilization=0.9"
        - "--max-model-len=4096"
        - "--dtype=auto"
        - "--host=0.0.0.0"
        - "--port=8000"
        - "--trust-remote-code"
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-credentials
              key: token
        resources:
          requests:
            nvidia.com/gpu: 1
            cpu: "2"
            memory: "16Gi"
          limits:
            nvidia.com/gpu: 1
            cpu: "8"
            memory: "32Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 300
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 300
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 3
        volumeMounts:
        - name: dshm
          mountPath: /dev/shm
        - name: model-cache
          mountPath: /root/.cache/huggingface
      volumes:
      - name: dshm
        emptyDir:
          medium: Memory
      - name: model-cache
        emptyDir:
          sizeLimit: 100Gi
