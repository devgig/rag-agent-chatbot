# Single Model Deployment for DGX Spark (1 GPU)
# ==============================================
# Qwen2.5-VL-7B-Instruct handles text, images, RAG, and code generation.
# 7B model for better quality responses on Blackwell GPU (128GB VRAM).
#
# Backend connects via: gpt-oss-120b.rag-agent-dev.svc.cluster.local:8000

apiVersion: apps/v1
kind: Deployment
metadata:
  name: gpt-oss-120b
  namespace: rag-agent-dev
  labels:
    app: gpt-oss-120b
    workspace: gpt-oss-120b
    component: model-inference
    managed-by: kaito
spec:
  replicas: 1
  strategy:
    type: Recreate
  progressDeadlineSeconds: 2400
  selector:
    matchLabels:
      workspace: gpt-oss-120b
  template:
    metadata:
      labels:
        workspace: gpt-oss-120b
        app: gpt-oss-120b
      annotations:
        ambient.istio.io/redirection: disabled  # Model pods don't need mesh; fixes probe timeouts from ztunnel interception
    spec:
      nodeSelector:
        nvidia.com/gpu.present: "true"
      tolerations:
      - key: nvidia.com/gpu
        operator: Equal
        value: present
        effect: NoSchedule
      containers:
      - name: vllm-inference
        image: nvcr.io/nvidia/vllm:25.11-py3
        command: ["vllm", "serve"]
        args:
        - "Qwen/Qwen2.5-VL-7B-Instruct"
        - "--served-model-name=gpt-oss-120b"
        - "--tensor-parallel-size=1"
        - "--gpu-memory-utilization=0.90"
        - "--max-model-len=16384"
        - "--dtype=bfloat16"
        - "--host=0.0.0.0"
        - "--port=8000"
        - "--trust-remote-code"
        - "--enforce-eager"
        - "--enable-auto-tool-choice"
        - "--tool-call-parser=hermes"
        - "--enable-prefix-caching"
        - "--chat-template=/chat-template/chat_template.jinja"
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-credentials
              key: token
        resources:
          requests:
            nvidia.com/gpu: 1
            cpu: "2"
            memory: "16Gi"
          limits:
            nvidia.com/gpu: 1
            cpu: "8"
            memory: "32Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 1800
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 300
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 3
        volumeMounts:
        - name: dshm
          mountPath: /dev/shm
        - name: model-cache
          mountPath: /root/.cache/huggingface
        - name: chat-template
          mountPath: /chat-template
      volumes:
      - name: dshm
        emptyDir:
          medium: Memory
      - name: model-cache
        persistentVolumeClaim:
          claimName: model-cache-pvc
      - name: chat-template
        configMap:
          name: qwen-chat-template
