# Manual Deployment for KAITO BYO GPU Mode
# ==========================================
# This deployment is a workaround for KAITO's BYO GPU mode limitation.
# KAITO workspace (kaito-workspace.yaml) is blocked by NodeClaim requirement,
# so we manually create the deployment with the same spec.
#
# Model: Qwen/Qwen2.5-3B-Instruct (open-source, excellent tool calling, optimized for 16GB GPU)
# Supports hermes tool-call-parser for MCP tool integration.
# Backend connects via: gpt-oss-120b.multi-agent-dev.svc.cluster.local:8000

apiVersion: apps/v1
kind: Deployment
metadata:
  name: gpt-oss-120b
  namespace: multi-agent-dev
  labels:
    app: gpt-oss-120b
    workspace: gpt-oss-120b
    component: model-inference
    managed-by: kaito
spec:
  replicas: 1
  strategy:
    type: Recreate
  progressDeadlineSeconds: 900  # 15 minutes for model loading + health check delay
  selector:
    matchLabels:
      workspace: gpt-oss-120b
  template:
    metadata:
      labels:
        workspace: gpt-oss-120b
        app: gpt-oss-120b
    spec:
      nodeSelector:
        nvidia.com/gpu.present: "true"
      tolerations:
      - key: nvidia.com/gpu
        operator: Equal
        value: present
        effect: NoSchedule
      containers:
      - name: vllm-inference
        image: nvcr.io/nvidia/vllm:25.11-py3
        command: ["vllm", "serve"]
        args:
        - "Qwen/Qwen2.5-3B-Instruct"
        - "--served-model-name=gpt-oss-120b"
        - "--tensor-parallel-size=1"
        - "--gpu-memory-utilization=0.85"
        - "--max-model-len=4096"
        - "--dtype=bfloat16"
        - "--host=0.0.0.0"
        - "--port=8000"
        - "--trust-remote-code"
        - "--enforce-eager"
        - "--enable-auto-tool-choice"
        - "--tool-call-parser=hermes"
        - "--enable-prefix-caching"
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-credentials
              key: token
        resources:
          requests:
            nvidia.com/gpu: 1
            cpu: "2"
            memory: "16Gi"
          limits:
            nvidia.com/gpu: 1
            cpu: "8"
            memory: "32Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 600
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 120
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 3
        volumeMounts:
        - name: dshm
          mountPath: /dev/shm
        - name: model-cache
          mountPath: /root/.cache/huggingface
      volumes:
      - name: dshm
        emptyDir:
          medium: Memory
      - name: model-cache
        emptyDir:
          sizeLimit: 100Gi
