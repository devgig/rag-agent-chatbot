apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hf-external-secret
  labels:
    app: gpt-oss-120b
    component: model-inference
  annotations:
    external-secrets.io/delete-on-resource-deletion: "true"
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: azure-keyvault-secret-store
  target:
    name: hf-credentials
    creationPolicy: Owner
  data:
  - secretKey: token
    remoteRef:
      key: huggingface-token
  refreshInterval: "0"
