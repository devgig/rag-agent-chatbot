# HuggingFace Token from Azure Key Vault
# ========================================
# Retrieves HuggingFace token for accessing gated models
# Token stored in Azure Key Vault: hugging-face-read-only-token
# Creates secret: hf-credentials (key: token)

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hf-external-secret
  namespace: llm
  labels:
    app: qwen35
    managed-by: kustomize
  annotations:
    external-secrets.io/delete-on-resource-deletion: "true"
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: azure-keyvault-secret-store
  target:
    name: hf-credentials
    creationPolicy: Owner
  data:
  - secretKey: token
    remoteRef:
      key: hugging-face-read-only-token
  refreshInterval: "0"
