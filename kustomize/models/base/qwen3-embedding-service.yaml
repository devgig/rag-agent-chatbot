# Service for Embedding (all-MiniLM-L6-v2)
# Service name 'qwen3-embedding' is legacy; the model served is all-MiniLM-L6-v2.
# Accessible at: http://qwen3-embedding:8000 (within namespace)
# Full DNS: qwen3-embedding.rag-agent.svc.cluster.local:8000

apiVersion: v1
kind: Service
metadata:
  name: qwen3-embedding
  labels:
    app: qwen3-embedding
    component: embedding-service
spec:
  type: ClusterIP
  selector:
    app: qwen3-embedding
  ports:
  - name: http
    port: 8000
    targetPort: 8000
    protocol: TCP
