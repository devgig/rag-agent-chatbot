# Service for Qwen3-Embedding
# Exposes embeddings API on port 8000
# Accessible at: http://qwen3-embedding:8000 (within namespace)
# Full DNS: qwen3-embedding.rag-agent-dev.svc.cluster.local:8000

apiVersion: v1
kind: Service
metadata:
  name: qwen3-embedding
  labels:
    app: qwen3-embedding
    component: embedding-service
spec:
  type: ClusterIP
  selector:
    app: qwen3-embedding
  ports:
  - name: http
    port: 8000
    targetPort: 8000
    protocol: TCP
