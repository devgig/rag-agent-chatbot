# Service for Qwen3.5-35B-A3B Model Inference
# =============================================
# ClusterIP service in the shared "llm" namespace.
# Consumers connect via: nemotron-nano.llm.svc.cluster.local:8000

apiVersion: v1
kind: Service
metadata:
  name: nemotron-nano
  namespace: llm
  labels:
    app: nemotron-nano
    managed-by: kustomize
spec:
  selector:
    workspace: nemotron-nano
  ports:
  - port: 8000
    targetPort: 8000
    name: http
  type: ClusterIP
