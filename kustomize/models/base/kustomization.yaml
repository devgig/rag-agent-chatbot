apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - deployment.yaml
  - service.yaml
  - hf-external-secret.yaml
  - acr-external-secret.yaml

patches:
  - target:
      kind: Deployment
      labelSelector: component=model-inference
    patch: |-
      - op: add
        path: /metadata/labels/environment
        value: dev
      - op: add
        path: /spec/template/metadata/labels/environment
        value: dev

images:
  - name: multi-agent-chatbot/models
    newName: bytecourier.azurecr.io/multi-agent-chatbot-models
    newTag: latest
