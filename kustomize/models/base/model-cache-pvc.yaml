# PersistentVolumeClaim for HuggingFace Model Cache
# =================================================
# Persists downloaded models across pod restarts to avoid re-downloading.
#
# Nemotron 3 Nano 30B-A3B NVFP4: ~15GB download
# With PVC: First startup ~3-5min, subsequent startups ~1-2min
# Without PVC: Every startup ~3-5min

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-cache-pvc
  namespace: llm
  labels:
    app: nemotron-nano
    component: model-inference
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 20Gi
