# PersistentVolumeClaim for HuggingFace Model Cache
# =================================================
# Persists downloaded models across pod restarts to avoid re-downloading.
# Significantly reduces startup time after initial download.
#
# Nemotron-Super-49B FP8: ~50GB download (pre-quantized FP8 weights)
# With PVC: First startup ~10-15min, subsequent startups ~3-5min
# Without PVC: Every startup ~10-15min

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-cache-pvc
  namespace: rag-agent
  labels:
    app: nemotron-super-49b
    component: model-inference
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
