# PersistentVolumeClaim for HuggingFace Model Cache
# =================================================
# Persists downloaded models across pod restarts to avoid re-downloading.
# Significantly reduces startup time after initial download.
#
# Qwen2.5-VL-7B-Instruct: ~15GB download
# With PVC: First startup ~5-10min, subsequent startups ~2-3min
# Without PVC: Every startup ~5-10min

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-cache-pvc
  namespace: rag-agent-dev
  labels:
    app: gpt-oss-120b
    component: model-inference
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
