# PersistentVolumeClaim for HuggingFace Model Cache
# =================================================
# Persists downloaded models across pod restarts to avoid re-downloading.
# Significantly reduces startup time after initial download.
#
# Nemotron-3-70B-Instruct: ~140GB download (FP16 weights, quantized to FP8 at load time)
# With PVC: First startup ~15-20min, subsequent startups ~5-8min
# Without PVC: Every startup ~15-20min

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-cache-pvc
  namespace: rag-agent
  labels:
    app: nemotron-70b
    component: model-inference
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
