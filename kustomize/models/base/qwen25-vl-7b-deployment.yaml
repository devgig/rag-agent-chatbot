# Single Model Deployment for DGX Spark (1 GPU)
# ==============================================
# Qwen2.5-VL-7B-Instruct-AWQ (4-bit quantized) for text, images, RAG, and code.
# AWQ quantization: ~3x smaller weights, faster loading, minimal quality loss.
#
# Backend connects via: qwen25-vl-7b.rag-agent.svc.cluster.local:8000

apiVersion: apps/v1
kind: Deployment
metadata:
  name: qwen25-vl-7b
  namespace: rag-agent
  labels:
    app: qwen25-vl-7b
    workspace: qwen25-vl-7b
    component: model-inference
    managed-by: kustomize
spec:
  replicas: 1
  strategy:
    type: Recreate
  progressDeadlineSeconds: 2400
  selector:
    matchLabels:
      workspace: qwen25-vl-7b
  template:
    metadata:
      labels:
        workspace: qwen25-vl-7b
        app: qwen25-vl-7b
        istio.io/dataplane-mode: none      # Skips istio-cni iptables setup — fixes probe timeouts
      annotations:
        ambient.istio.io/redirection: disabled  # Also disables ztunnel redirection
    spec:
      nodeSelector:
        nvidia.com/gpu.present: "true"
      tolerations:
      - key: nvidia.com/gpu
        operator: Equal
        value: present
        effect: NoSchedule
      containers:
      - name: vllm-inference
        image: nvcr.io/nvidia/vllm:25.11-py3
        command: ["vllm", "serve"]
        args:
        - "Qwen/Qwen2.5-VL-7B-Instruct-AWQ"
        - "--served-model-name=qwen25-vl-7b"
        - "--tensor-parallel-size=1"
        - "--gpu-memory-utilization=0.90"
        - "--max-model-len=16384"
        - "--quantization=awq_marlin"
        - "--dtype=half"
        - "--host=0.0.0.0"
        - "--port=8000"
        - "--trust-remote-code"
        - "--enforce-eager"
        - "--enable-auto-tool-choice"
        - "--tool-call-parser=hermes"
        - "--enable-prefix-caching"
        - "--chat-template=/chat-template/chat_template.jinja"
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: HF_HUB_OFFLINE
          value: "0"  # Must be 0 for first startup to download AWQ model; set to 1 after cached
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-credentials
              key: token
        resources:
          requests:
            nvidia.com/gpu: 1
            cpu: "2"
            memory: "16Gi"
          limits:
            nvidia.com/gpu: 1
            cpu: "8"
            memory: "32Gi"
        startupProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 30   # 60s + 30*30s = 960s max startup (model loads in ~450s)
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          periodSeconds: 30
          timeoutSeconds: 30
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 3
        volumeMounts:
        - name: dshm
          mountPath: /dev/shm
        - name: model-cache
          mountPath: /root/.cache/huggingface
        - name: chat-template
          mountPath: /chat-template
      volumes:
      - name: dshm
        emptyDir:
          medium: Memory
      - name: model-cache
        persistentVolumeClaim:
          claimName: model-cache-pvc
      - name: chat-template
        configMap:
          name: qwen-chat-template
