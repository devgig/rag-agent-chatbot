# Service for Qwen3-Coder-Next Model Inference
# =============================================
# ClusterIP service in the "llm" namespace.
# Consumers connect via: qwen3-coder-next.llm.svc.cluster.local:8000

apiVersion: v1
kind: Service
metadata:
  name: qwen3-coder-next
  namespace: llm
  labels:
    app: qwen3-coder-next
    managed-by: kustomize
spec:
  selector:
    workspace: qwen3-coder-next
  ports:
  - port: 8000
    targetPort: 8000
    name: http
  type: ClusterIP
