# Service for Qwen3.5-35B-A3B Model Inference
# =============================================
# ClusterIP service in the shared "llm" namespace.
# Consumers connect via: qwen35.llm.svc.cluster.local:8000

apiVersion: v1
kind: Service
metadata:
  name: qwen35
  namespace: llm
  labels:
    app: qwen35
    managed-by: kustomize
spec:
  selector:
    workspace: qwen35
  ports:
  - port: 8000
    targetPort: 8000
    name: http
  type: ClusterIP
