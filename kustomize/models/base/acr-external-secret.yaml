apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: acr-external-secret
  labels:
    app: gpt-oss-120b
    component: model-inference
  annotations:
    external-secrets.io/delete-on-resource-dissolution: "true"
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: azure-keyvault-secret-store
  target:
    name: acr-secret
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {
            "auths": {
              "{{ .acrServer }}": {
                "username": "{{ .acrUsername }}",
                "password": "{{ .acrPassword }}",
                "auth": "{{ printf "%s:%s" .acrUsername .acrPassword | b64enc }}"
              }
            }
          }
  data:
  - secretKey: acrServer
    remoteRef:
      key: acr-server
  - secretKey: acrUsername
    remoteRef:
      key: acr-username
  - secretKey: acrPassword
    remoteRef:
      key: acr-password
  refreshInterval: 1h
