# Llama-3.3-Nemotron-Super-49B Deployment for DGX Spark
# =====================================================
# NVIDIA Llama-3.3-Nemotron-Super-49B-v1.5 with NVFP4 quantization.
# NAS-pruned from Llama-3.3-70B — near-70B quality at 49B parameter cost.
# ~25GB VRAM for weights at NVFP4. gpu-memory-utilization=0.55 allocates ~66Gi
# of 120Gi unified memory, leaving ~54Gi for OS, K3S, and daemonsets.
# NVFP4 roughly doubles generation throughput vs FP8 (~50GB) by halving
# memory-bandwidth pressure, at a ~2-3% quality cost on benchmarks.
#
# FP8 alternative (higher quality, slower):
#   model: nvidia/Llama-3_3-Nemotron-Super-49B-v1_5-FP8 (~50Gi weights)
#   add: --trust-remote-code
#   change: --gpu-memory-utilization=0.70
#
# Backend connects via: nemotron-super-49b.rag-agent.svc.cluster.local:8000

apiVersion: apps/v1
kind: Deployment
metadata:
  name: nemotron-super-49b
  namespace: rag-agent
  labels:
    app: nemotron-super-49b
    workspace: nemotron-super-49b
    component: model-inference
    managed-by: kustomize
spec:
  replicas: 1
  strategy:
    type: Recreate
  progressDeadlineSeconds: 2400
  selector:
    matchLabels:
      workspace: nemotron-super-49b
  template:
    metadata:
      labels:
        workspace: nemotron-super-49b
        app: nemotron-super-49b
        istio.io/dataplane-mode: none      # Skips istio-cni iptables setup — fixes probe timeouts
      annotations:
        ambient.istio.io/redirection: disabled  # Also disables ztunnel redirection
    spec:
      nodeSelector:
        nvidia.com/gpu.present: "true"
      tolerations:
      - key: nvidia.com/gpu
        operator: Equal
        value: present
        effect: NoSchedule
      containers:
      - name: vllm-inference
        image: nvcr.io/nvidia/vllm:26.03-py3
        command: ["vllm", "serve"]
        args:
        - "nvidia/Llama-3_3-Nemotron-Super-49B-v1_5-NVFP4"
        # FP8 alternative (higher quality, slower):
        # - "nvidia/Llama-3_3-Nemotron-Super-49B-v1_5-FP8"
        - "--served-model-name=nemotron-super-49b"
        - "--tensor-parallel-size=1"
        - "--gpu-memory-utilization=0.55"
        - "--max-model-len=16384"
        - "--dtype=auto"
        - "--host=0.0.0.0"
        - "--port=8000"
        - "--enable-auto-tool-choice"
        - "--tool-call-parser=llama3_json"
        - "--enable-prefix-caching"
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: HF_HUB_OFFLINE
          value: "0"  # Set to 1 after NVFP4 model is cached on PVC
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-credentials
              key: token
        resources:
          requests:
            nvidia.com/gpu: 1
            cpu: "4"
            memory: "16Gi"
          limits:
            nvidia.com/gpu: 1
            cpu: "16"
            memory: "64Gi"
        startupProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 120
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 120  # 120s + 120*30s = 3720s (62 min) — accounts for first-time model download (~25GB NVFP4)
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          periodSeconds: 30
          timeoutSeconds: 30
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 3
        volumeMounts:
        - name: dshm
          mountPath: /dev/shm
        - name: model-cache
          mountPath: /root/.cache/huggingface
      volumes:
      - name: dshm
        emptyDir:
          medium: Memory
      - name: model-cache
        persistentVolumeClaim:
          claimName: model-cache-pvc
