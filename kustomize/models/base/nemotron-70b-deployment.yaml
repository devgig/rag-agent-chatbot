# Llama-3.1-Nemotron-70B-Instruct Deployment for DGX Spark
# ========================================================
# NVIDIA Llama-3.1-Nemotron-70B-Instruct-HF with FP8 quantization for text, RAG, and code.
# FP8 quantization: Blackwell-native, ~70GB model weights, minimal quality loss.
#
# Backend connects via: nemotron-70b.rag-agent.svc.cluster.local:8000

apiVersion: apps/v1
kind: Deployment
metadata:
  name: nemotron-70b
  namespace: rag-agent
  labels:
    app: nemotron-70b
    workspace: nemotron-70b
    component: model-inference
    managed-by: kustomize
spec:
  replicas: 1
  strategy:
    type: Recreate
  progressDeadlineSeconds: 2400
  selector:
    matchLabels:
      workspace: nemotron-70b
  template:
    metadata:
      labels:
        workspace: nemotron-70b
        app: nemotron-70b
        istio.io/dataplane-mode: none      # Skips istio-cni iptables setup — fixes probe timeouts
      annotations:
        ambient.istio.io/redirection: disabled  # Also disables ztunnel redirection
    spec:
      nodeSelector:
        nvidia.com/gpu.present: "true"
      tolerations:
      - key: nvidia.com/gpu
        operator: Equal
        value: present
        effect: NoSchedule
      containers:
      - name: vllm-inference
        image: nvcr.io/nvidia/vllm:25.11-py3
        command: ["vllm", "serve"]
        args:
        - "nvidia/Llama-3.1-Nemotron-70B-Instruct-HF"
        - "--served-model-name=nemotron-70b"
        - "--tensor-parallel-size=1"
        - "--gpu-memory-utilization=0.90"
        - "--max-model-len=8192"
        - "--quantization=fp8"
        - "--dtype=auto"
        - "--host=0.0.0.0"
        - "--port=8000"
        - "--trust-remote-code"
        - "--enforce-eager"
        - "--enable-auto-tool-choice"
        - "--tool-call-parser=hermes"
        - "--enable-prefix-caching"
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: HF_HUB_OFFLINE
          value: "0"  # Must be 0 for first startup to download model; set to 1 after cached
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-credentials
              key: token
        resources:
          requests:
            nvidia.com/gpu: 1
            cpu: "4"
            memory: "32Gi"
          limits:
            nvidia.com/gpu: 1
            cpu: "16"
            memory: "96Gi"
        startupProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 120
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 40   # 120s + 40*30s = 1320s max startup (70B loads slower than 7B)
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          periodSeconds: 30
          timeoutSeconds: 30
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 3
        volumeMounts:
        - name: dshm
          mountPath: /dev/shm
        - name: model-cache
          mountPath: /root/.cache/huggingface
      volumes:
      - name: dshm
        emptyDir:
          medium: Memory
      - name: model-cache
        persistentVolumeClaim:
          claimName: model-cache-pvc
