apiVersion: kaito.sh/v1beta1
kind: Workspace
metadata:
  name: gpt-oss-120b
  namespace: multi-agent-dev
# NOTE: KAITO v1beta1 uses top-level fields (resource, inference) not nested under spec
# For BYO GPU mode with NVIDIA GPU Operator: instanceType is required but preferredNodes overrides it
# labelSelector and preferredNodes force KAITO to use existing GPU nodes instead of provisioning
resource:
  count: 1
  instanceType: "Standard_NC24ads_A100_v4"  # Required by validation, preferredNodes forces BYO GPU mode
  labelSelector:
    matchLabels:
      nvidia.com/gpu.present: "true"
  preferredNodes:
  - spark-7eb5

# Using vLLM runtime with custom HuggingFace model
# Replace MODEL_ID with your actual HuggingFace model (e.g., "meta-llama/Meta-Llama-3.1-70B-Instruct")
inference:
    template:
      spec:
        tolerations:
        - key: nvidia.com/gpu
          operator: Equal
          value: present
          effect: NoSchedule
        containers:
        - name: vllm-inference
          # Use official vLLM image for GB10 GPU support
          image: vllm/vllm-openai:latest
          ports:
          - containerPort: 8000
            name: http
          env:
          - name: MODEL_ID
            value: "meta-llama/Meta-Llama-3.1-8B-Instruct"  # Start with 8B for fast testing
          - name: INFERENCE_ENGINE
            value: "vllm"
          - name: TENSOR_PARALLEL_SIZE
            value: "1"
          - name: GPU_MEMORY_UTILIZATION
            value: "0.9"
          - name: MAX_MODEL_LEN
            value: "8192"
          - name: DTYPE
            value: "auto"
          # Uncomment for gated/private models:
          # - name: HF_TOKEN
          #   valueFrom:
          #     secretKeyRef:
          #       name: hf-credentials
          #       key: token
          resources:
            requests:
              nvidia.com/gpu: 1
              cpu: "2"
              memory: "16Gi"
            limits:
              nvidia.com/gpu: 1
              cpu: "8"
              memory: "32Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 300
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 300
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3
          volumeMounts:
          - name: dshm
            mountPath: /dev/shm
          - name: model-cache
            mountPath: /root/.cache/huggingface
        volumes:
        - name: dshm
          emptyDir:
            medium: Memory
        - name: model-cache
          emptyDir:
            sizeLimit: 100Gi
