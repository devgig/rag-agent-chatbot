# KAITO Workspace for GPU Model Inference
# ==========================================
# NOTE: This workspace is kept for reference but does NOT create the actual deployment
# due to KAITO limitation with BYO GPU mode (NodeClaim requirement).
# The actual deployment is created by gpt-oss-deployment.yaml
# See kustomization.yaml for details.
#
# KAITO v1beta1 uses top-level fields (resource, inference) not nested under spec

apiVersion: kaito.sh/v1beta1
kind: Workspace
metadata:
  name: gpt-oss-120b
  namespace: multi-agent-dev

# Resource Configuration for BYO GPU Mode
resource:
  count: 1
  instanceType: "Standard_NC24ads_A100_v4"  # Required by validation, preferredNodes forces BYO GPU mode
  labelSelector:
    matchLabels:
      nvidia.com/gpu.present: "true"
  preferredNodes:
  - spark-7eb5  # GPU node name (update for your environment)

# Inference Configuration (matches gpt-oss-deployment.yaml)
inference:
    template:
      spec:
        tolerations:
        - key: nvidia.com/gpu
          operator: Equal
          value: present
          effect: NoSchedule
        containers:
        - name: vllm-inference
          image: vllm/vllm-openai:latest
          command: ["python3", "-m", "vllm.entrypoints.openai.api_server"]
          args:
          - "--model=microsoft/Phi-3.5-mini-instruct"
          - "--tensor-parallel-size=1"
          - "--gpu-memory-utilization=0.9"
          - "--max-model-len=4096"
          - "--dtype=auto"
          - "--host=0.0.0.0"
          - "--port=8000"
          - "--trust-remote-code"
          ports:
          - containerPort: 8000
            name: http
          env:
          - name: HF_TOKEN
            valueFrom:
              secretKeyRef:
                name: hf-credentials
                key: token
          resources:
            requests:
              nvidia.com/gpu: 1
              cpu: "2"
              memory: "16Gi"
            limits:
              nvidia.com/gpu: 1
              cpu: "8"
              memory: "32Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 300
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 300
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3
          volumeMounts:
          - name: dshm
            mountPath: /dev/shm
          - name: model-cache
            mountPath: /root/.cache/huggingface
        volumes:
        - name: dshm
          emptyDir:
            medium: Memory
        - name: model-cache
          emptyDir:
            sizeLimit: 100Gi
