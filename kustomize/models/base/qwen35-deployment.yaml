# Nemotron 3 Nano 30B-A3B Deployment for DGX Spark
# =================================================
# NVIDIA Nemotron 3 Nano MoE model with NVFP4 quantization.
# 30B total parameters, only 3B active per token — delivers ~56 tok/s (vLLM)
# or ~70 tok/s (llama.cpp) on GB10. ~15GB VRAM for weights at NVFP4.
# gpu-memory-utilization=0.55 allocates ~66Gi, leaving ~54Gi for OS/K3s.
#
# Deployed in the shared "llm" namespace so multiple projects
# (rag-agent-chatbot, ai-agents/NemoClaw, etc.) can use it.
#
# Consumers connect via: qwen35.llm.svc.cluster.local:8000
# (Service name kept as "qwen35" for compatibility — model is Nemotron Nano)

apiVersion: apps/v1
kind: Deployment
metadata:
  name: qwen35
  namespace: llm
  labels:
    app: qwen35
    workspace: qwen35
    component: model-inference
    managed-by: kustomize
spec:
  replicas: 1
  strategy:
    type: Recreate
  progressDeadlineSeconds: 2400
  selector:
    matchLabels:
      workspace: qwen35
  template:
    metadata:
      labels:
        workspace: qwen35
        app: qwen35
        istio.io/dataplane-mode: none
      annotations:
        ambient.istio.io/redirection: disabled
    spec:
      nodeSelector:
        nvidia.com/gpu.present: "true"
      tolerations:
      - key: nvidia.com/gpu
        operator: Equal
        value: present
        effect: NoSchedule
      containers:
      - name: vllm-inference
        image: nvcr.io/nvidia/vllm:26.02-py3
        command: ["vllm", "serve"]
        args:
        - "nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-NVFP4"
        - "--served-model-name=qwen35"
        - "--tensor-parallel-size=1"
        - "--gpu-memory-utilization=0.55"
        - "--max-model-len=16384"
        - "--dtype=auto"
        - "--host=0.0.0.0"
        - "--port=8000"
        - "--trust-remote-code"
        - "--enable-auto-tool-choice"
        - "--tool-call-parser=hermes"
        - "--enable-prefix-caching"
        - "--chat-template-kwargs={\"enable_thinking\":false}"
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: HF_HUB_OFFLINE
          value: "0"  # Set to 1 after model is cached on PVC
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-credentials
              key: token
        resources:
          requests:
            nvidia.com/gpu: 1
            cpu: "4"
            memory: "16Gi"
          limits:
            nvidia.com/gpu: 1
            cpu: "16"
            memory: "64Gi"
        startupProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 120
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 120
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          periodSeconds: 30
          timeoutSeconds: 30
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 3
        volumeMounts:
        - name: dshm
          mountPath: /dev/shm
        - name: model-cache
          mountPath: /root/.cache/huggingface
      volumes:
      - name: dshm
        emptyDir:
          medium: Memory
      - name: model-cache
        persistentVolumeClaim:
          claimName: model-cache-pvc
