# Qwen3-Coder-Next 80B-A3B Deployment for DGX Spark
# ===================================================
# Qwen3-Coder-Next: 80B total / 3B active MoE with hybrid attention.
# Purpose-built for coding agents. SWE-Bench Verified ~70% with an agent scaffold,
# comparable to Sonnet 4.5 on agentic coding.
#
# Memory math on GB10 (128Gi unified, gpu-memory-utilization=0.85 → ~108Gi):
#   weights (FP8 runtime quantization): ~80Gi
#   KV cache at 128K context:          ~20-25Gi
#   headroom:                          remainder
# That's why --max-model-len=131072 is the ceiling on a single GPU. Bumping
# to 256K requires a more aggressive quantization (e.g. AWQ/MXFP4) or TP=2.
#
# Consumers connect via: qwen3-coder-next.llm.svc.cluster.local:8000
# LiteLLM (ai-agents repo) and rag-agent-chatbot backend both use this endpoint.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: qwen3-coder-next
  namespace: llm
  labels:
    app: qwen3-coder-next
    workspace: qwen3-coder-next
    component: model-inference
    managed-by: kustomize
spec:
  replicas: 1
  strategy:
    type: Recreate
  progressDeadlineSeconds: 3600
  selector:
    matchLabels:
      workspace: qwen3-coder-next
  template:
    metadata:
      labels:
        workspace: qwen3-coder-next
        app: qwen3-coder-next
        istio.io/dataplane-mode: none
      annotations:
        ambient.istio.io/redirection: disabled
    spec:
      nodeSelector:
        nvidia.com/gpu.present: "true"
      tolerations:
      - key: nvidia.com/gpu
        operator: Equal
        value: present
        effect: NoSchedule
      containers:
      - name: vllm-inference
        # NVIDIA's April 2026 post-release container. Confirmed loading NVFP4 +
        # running vLLM >= 0.15 on GB10. Required for `--tool-call-parser=qwen3_coder`.
        image: nvcr.io/nvidia/vllm:26.03.post1-py3
        command: ["vllm", "serve"]
        args:
        - "Qwen/Qwen3-Coder-Next"
        - "--served-model-name=qwen3-coder-next"
        - "--tensor-parallel-size=1"
        - "--gpu-memory-utilization=0.85"
        - "--max-model-len=131072"
        - "--quantization=fp8"
        - "--dtype=auto"
        - "--host=0.0.0.0"
        - "--port=8000"
        - "--trust-remote-code"
        - "--enable-auto-tool-choice"
        - "--tool-call-parser=qwen3_coder"
        - "--enable-prefix-caching"
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: HF_HOME
          value: "/root/.cache"
        # First boot: DO NOT set HF_HUB_OFFLINE=1 -- the PVC is empty and needs
        # to fetch ~80Gi of FP8 weights from HuggingFace (expect 10-30 min on
        # the first pod). Re-add HF_HUB_OFFLINE=1 after the download completes
        # to skip network checks on subsequent restarts.
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-credentials
              key: token
        resources:
          requests:
            nvidia.com/gpu: 1
            cpu: "2"
            memory: "32Gi"
          limits:
            nvidia.com/gpu: 1
            cpu: "16"
            memory: "96Gi"
        startupProbe:
          httpGet:
            path: /health
            port: 8000
          # Generous: weight download + load + warmup can take 10-30 min on cold start.
          initialDelaySeconds: 180
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 180
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          periodSeconds: 30
          timeoutSeconds: 30
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 3
        volumeMounts:
        - name: dshm
          mountPath: /dev/shm
        - name: model-cache
          mountPath: /root/.cache
      volumes:
      - name: dshm
        emptyDir:
          medium: Memory
      - name: model-cache
        persistentVolumeClaim:
          claimName: model-cache-pvc
