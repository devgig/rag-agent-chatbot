# Vision Language Model for Image Understanding
# ==============================================
# Qwen2.5-VL-3B-Instruct for processing images and visual content.
# Used by the explain_image MCP tool.
#
# Backend connects via: qwen2.5-vl.multi-agent-dev.svc.cluster.local:8000

apiVersion: apps/v1
kind: Deployment
metadata:
  name: qwen2.5-vl
  namespace: multi-agent-dev
  labels:
    app: qwen2.5-vl
    workspace: qwen2.5-vl
    component: model-inference
spec:
  replicas: 1
  strategy:
    type: Recreate
  progressDeadlineSeconds: 900
  selector:
    matchLabels:
      workspace: qwen2.5-vl
  template:
    metadata:
      labels:
        workspace: qwen2.5-vl
        app: qwen2.5-vl
    spec:
      nodeSelector:
        nvidia.com/gpu.present: "true"
      tolerations:
      - key: nvidia.com/gpu
        operator: Equal
        value: present
        effect: NoSchedule
      containers:
      - name: vllm-inference
        image: nvcr.io/nvidia/vllm:25.11-py3
        command: ["vllm", "serve"]
        args:
        - "Qwen/Qwen2.5-VL-3B-Instruct"
        - "--served-model-name=qwen2.5-vl"
        - "--tensor-parallel-size=1"
        - "--gpu-memory-utilization=0.40"
        - "--max-model-len=4096"
        - "--dtype=bfloat16"
        - "--host=0.0.0.0"
        - "--port=8000"
        - "--trust-remote-code"
        - "--enforce-eager"
        - "--enable-prefix-caching"
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-credentials
              key: token
        resources:
          requests:
            nvidia.com/gpu: 1
            cpu: "2"
            memory: "16Gi"
          limits:
            nvidia.com/gpu: 1
            cpu: "8"
            memory: "32Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 600
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 120
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 3
        volumeMounts:
        - name: dshm
          mountPath: /dev/shm
        - name: model-cache
          mountPath: /root/.cache/huggingface
      volumes:
      - name: dshm
        emptyDir:
          medium: Memory
      - name: model-cache
        emptyDir:
          sizeLimit: 100Gi
---
apiVersion: v1
kind: Service
metadata:
  name: qwen2.5-vl
  namespace: multi-agent-dev
  labels:
    app: qwen2.5-vl
spec:
  selector:
    app: qwen2.5-vl
  ports:
  - name: http
    port: 8000
    targetPort: 8000
  type: ClusterIP
