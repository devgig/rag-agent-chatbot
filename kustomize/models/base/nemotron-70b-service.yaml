# Service for GPU Model Inference
# ================================
# ClusterIP service exposing vLLM OpenAI-compatible API
# Backend connects via: nemotron-70b.rag-agent.svc.cluster.local:8000

apiVersion: v1
kind: Service
metadata:
  name: nemotron-70b
  namespace: rag-agent
  labels:
    app: nemotron-70b
    managed-by: kustomize
spec:
  selector:
    workspace: nemotron-70b
  ports:
  - port: 8000
    targetPort: 8000
    name: http
  type: ClusterIP
