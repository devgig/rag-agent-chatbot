apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: nemotron-nano-llm-dev

# No global namespace override — resources specify their own namespace
# (llm for the model, rag-agent for the ExternalName service and embeddings)

resources:
  - ../../base

labels:
- includeSelectors: false
  pairs:
    environment: dev
