apiVersion: apps/v1
kind: Deployment
metadata:
  name: multi-agent-backend
  labels:
    app: multi-agent-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: multi-agent-backend
  template:
    metadata:
      labels:
        app: multi-agent-backend
    spec:
      containers:
      - name: backend
        image: multi-agent-chatbot/backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: POSTGRES_HOST
          value: "postgres"
        - name: POSTGRES_DB
          value: "chatbot"
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: username
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: password
        - name: ETCD_ENDPOINTS
          value: "etcd:2379"
        - name: MINIO_ADDRESS
          value: "minio:9000"
        - name: MILVUS_ADDRESS
          value: "milvus:19530"
        - name: MODELS
          value: "gpt-oss-120b"
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "2000m"
            memory: "2Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 5
