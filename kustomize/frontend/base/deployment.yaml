apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-agent-frontend
  labels:
    app: rag-agent-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-agent-frontend
  template:
    metadata:
      labels:
        app: rag-agent-frontend
        istio.io/dataplane-mode: none
      annotations:
        ambient.istio.io/redirection: disabled
    spec:
      imagePullSecrets:
      - name: acr-secret
      containers:
      - name: frontend
        image: rag-agent-chatbot/frontend:latest
        imagePullPolicy: IfNotPresent
        securityContext:
          runAsNonRoot: true
          runAsUser: 101  # nginx user
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: BACKEND_URL
          value: "http://rag-agent-backend.rag-agent.svc.cluster.local:8000"
        - name: BACKEND_WS_URL
          value: "ws://rag-agent-backend.rag-agent.svc.cluster.local:8000"
        volumeMounts:
        - name: tmp-volume
          mountPath: /tmp
        - name: nginx-cache
          mountPath: /var/cache/nginx
        - name: nginx-run
          mountPath: /var/run
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 3
      volumes:
      - name: tmp-volume
        emptyDir: {}
      - name: nginx-cache
        emptyDir: {}
      - name: nginx-run
        emptyDir: {}
