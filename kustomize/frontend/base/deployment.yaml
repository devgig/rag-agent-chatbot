apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-agent-frontend
  labels:
    app: rag-agent-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-agent-frontend
  template:
    metadata:
      labels:
        app: rag-agent-frontend
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: NotIn
                values:
                - storage01
                - storage02
                - storage03
      imagePullSecrets:
      - name: acr-secret
      containers:
      - name: frontend
        image: rag-agent-chatbot/frontend:latest
        imagePullPolicy: IfNotPresent
        securityContext:
          capabilities:
            add:
              - NET_RAW
              - NET_ADMIN
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: BACKEND_URL
          value: "http://rag-agent-backend.rag-agent-dev.svc.cluster.local:8000"
        - name: BACKEND_WS_URL
          value: "ws://rag-agent-backend.rag-agent-dev.svc.cluster.local:8000"
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 3
