apiVersion: apps/v1
kind: Deployment
metadata:
  name: multi-agent-frontend
  labels:
    app: multi-agent-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: multi-agent-frontend
  template:
    metadata:
      labels:
        app: multi-agent-frontend
    spec:
      imagePullSecrets:
      - name: acr-secret
      containers:
      - name: frontend
        image: multi-agent-chatbot/frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: BACKEND_URL
          value: "http://multi-agent-backend.multi-agent-dev.svc.cluster.local:8000"
        - name: BACKEND_WS_URL
          value: "ws://multi-agent-backend.multi-agent-dev.svc.cluster.local:8000"
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
