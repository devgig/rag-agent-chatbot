apiVersion: v1
kind: Service
metadata:
  name: multi-agent-frontend
  labels:
    app: multi-agent-frontend
  annotations:
    service.cilium.io/global: "true"
spec:
  selector:
    app: multi-agent-frontend
  ports:
  - port: 3000
    targetPort: 3000
    name: http
  type: LoadBalancer
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600
