apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: multi-agent-frontend

resources:
  - deployment.yaml
  - service.yaml

patches:
  - target:
      kind: Deployment
      name: multi-agent-frontend
    path: image-patch.yaml

labels:
- includeSelectors: true
  pairs:
    app: multi-agent-frontend
    component: frontend
