apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: multi-agent-frontend-httproute
spec:
  parentRefs:
  - name: private-gateway
  hostnames:
  - "multi-agent-chatbot.internal"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: multi-agent-frontend
      port: 3000
