apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: multi-agent-frontend-dev

namespace: multi-agent-dev

resources:
  - namespace.yaml
  - ../../base

labels:
- includeSelectors: false
  pairs:
    environment: dev

replicas:
  - name: multi-agent-frontend
    count: 1
