# Service for Embedding (all-MiniLM-L6-v2)
# Exposes embeddings API on port 8000
# Accessible at: http://embedding:8000 (within namespace)
# Full DNS: embedding.rag-agent.svc.cluster.local:8000

apiVersion: v1
kind: Service
metadata:
  name: embedding
  labels:
    app: embedding
    component: embedding-service
spec:
  type: ClusterIP
  selector:
    app: embedding
  ports:
  - name: http
    port: 8000
    targetPort: 8000
    protocol: TCP
