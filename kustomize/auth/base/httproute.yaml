apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: auth-httproute
spec:
  hostnames:
    - auth.bytecourier.local
    - auth.bytecourier.com
  parentRefs:
    - name: rag-agent-gateway
      namespace: istio-ingress
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: auth
          port: 8000
