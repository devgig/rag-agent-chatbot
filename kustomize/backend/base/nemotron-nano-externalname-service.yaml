# ExternalName Service — makes nemotron-nano resolvable from the rag-agent namespace.
# The backend constructs URLs as http://{model_name}:8000/v1 using just the
# short service name, so this alias lets it reach the llm namespace.

apiVersion: v1
kind: Service
metadata:
  name: nemotron-nano
  namespace: rag-agent
spec:
  type: ExternalName
  externalName: nemotron-nano.llm.svc.cluster.local
