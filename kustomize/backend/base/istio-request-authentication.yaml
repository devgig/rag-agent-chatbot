# DEPRECATED: JWT enforcement moved to ingress gateway.
# See kustomize/gateway/base/istio-request-authentication.yaml
# Kept for reference only — not included in kustomization.yaml.

apiVersion: security.istio.io/v1
kind: RequestAuthentication
metadata:
  name: backend-jwt-auth
spec:
  targetRefs:
    - kind: Gateway
      group: gateway.networking.k8s.io
      name: backend-waypoint
  jwtRules:
    - issuer: "spark-chat"
      jwksUri: "http://auth.rag-agent.svc.cluster.local:8000/.well-known/jwks.json"
      fromHeaders:
        - name: Authorization
          prefix: "Bearer "
      fromParams:
        - token
      forwardOriginalToken: true
