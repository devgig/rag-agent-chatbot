# ExternalName Service -- makes qwen3-coder-next resolvable from the rag-agent
# namespace. The backend constructs URLs as http://{model_name}:8000/v1 using
# just the short service name, so this alias lets it reach the llm namespace.

apiVersion: v1
kind: Service
metadata:
  name: qwen3-coder-next
  namespace: rag-agent
spec:
  type: ExternalName
  externalName: qwen3-coder-next.llm.svc.cluster.local
