apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-agent-backend
  labels:
    app: rag-agent-backend
    component: backend
spec:
  replicas: 1  # KEDA will manage scaling
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: rag-agent-backend
  template:
    metadata:
      labels:
        app: rag-agent-backend
      annotations:
        # Graceful shutdown for WebSocket connections
        cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
    spec:
      imagePullSecrets:
      - name: acr-secret
      initContainers:
      - name: create-config
        image: busybox
        command: ['sh', '-c', 'echo ''{"sources":[],"models":["gpt-oss-120b"],"selected_model":"gpt-oss-120b","selected_sources":[],"current_chat_id":null}'' > /config/config.json && chmod 666 /config/config.json']
        volumeMounts:
        - name: config-volume
          mountPath: /config
      containers:
      - name: backend
        image: rag-agent-chatbot/backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: POSTGRES_HOST
          value: "postgresql.postgres-system.svc.cluster.local"
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: database
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: username
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: password
        - name: MILVUS_ADDRESS
          value: "tcp://milvus.milvus-system.svc.cluster.local:19530"
        - name: MODELS
          value: "gpt-oss-120b"
        - name: CONFIG_PATH
          value: "/config/config.json"
        - name: AUTH_ALLOWED_EMAILS
          valueFrom:
            secretKeyRef:
              name: auth-credentials
              key: allowed-emails
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: auth-credentials
              key: jwt-secret
        volumeMounts:
        - name: tmp-volume
          mountPath: /tmp
        - name: config-volume
          mountPath: /config
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "2000m"
            memory: "2Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 300
          periodSeconds: 60
          timeoutSeconds: 30
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 3
      volumes:
      - name: tmp-volume
        emptyDir: {}
      - name: config-volume
        emptyDir: {}
