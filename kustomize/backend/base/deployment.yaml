apiVersion: apps/v1
kind: Deployment
metadata:
  name: multi-agent-backend
  labels:
    app: multi-agent-backend
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: multi-agent-backend
  template:
    metadata:
      labels:
        app: multi-agent-backend
    spec:
      imagePullSecrets:
      - name: acr-secret
      containers:
      - name: backend
        image: multi-agent-chatbot/backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: POSTGRES_HOST
          value: "postgresql.postgres-system.svc.cluster.local"
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: database
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: username
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: password
        - name: MILVUS_ADDRESS
          value: "tcp://milvus.milvus-system.svc.cluster.local:19530"
        - name: MODELS
          value: "gpt-oss-120b"
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "2000m"
            memory: "2Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 300
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 5
