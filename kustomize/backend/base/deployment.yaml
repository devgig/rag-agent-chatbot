apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-agent-backend
  labels:
    app: rag-agent-backend
    component: backend
spec:
  replicas: 1  # KEDA will manage scaling
  progressDeadlineSeconds: 600
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: rag-agent-backend
  template:
    metadata:
      labels:
        app: rag-agent-backend
      annotations:
        # Graceful shutdown for WebSocket connections
        cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: NotIn
                values:
                - storage01
                - storage02
                - storage03
      imagePullSecrets:
      - name: acr-secret
      initContainers:
      - name: create-config
        image: busybox
        command: ['sh', '-c', 'echo ''{"sources":[],"models":["nemotron-70b"],"selected_model":"nemotron-70b","selected_sources":[],"current_chat_id":null}'' > /config/config.json']
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        volumeMounts:
        - name: config-volume
          mountPath: /config
      containers:
      - name: backend
        image: rag-agent-chatbot/backend:latest
        imagePullPolicy: IfNotPresent
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: POSTGRES_HOST
          value: "postgresql.postgres-system.svc.cluster.local"
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: database
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: username
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: password
        - name: MILVUS_ADDRESS
          value: "tcp://milvus.milvus-system.svc.cluster.local:19530"
        - name: MODELS
          value: "nemotron-70b"
        - name: CONFIG_PATH
          value: "/config/config.json"
        - name: JWKS_URL
          value: "http://auth-backend.auth-service.svc.cluster.local:8000/.well-known/jwks.json"
        volumeMounts:
        - name: tmp-volume
          mountPath: /tmp
        - name: config-volume
          mountPath: /config
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "2000m"
            memory: "2Gi"
        startupProbe:
          exec:
            command:
            - /app/.venv/bin/python
            - -c
            - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 30
        livenessProbe:
          exec:
            command:
            - /app/.venv/bin/python
            - -c
            - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"
          periodSeconds: 60
          timeoutSeconds: 10
          failureThreshold: 5
        readinessProbe:
          exec:
            command:
            - /app/.venv/bin/python
            - -c
            - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 3
      volumes:
      - name: tmp-volume
        emptyDir: {}
      - name: config-volume
        emptyDir: {}
