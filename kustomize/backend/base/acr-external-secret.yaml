apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: acr-external-secret
  annotations:
    "external-secrets.io/delete-on-resource-deletion": "true"
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: azure-keyvault-secret-store
    kind: ClusterSecretStore
  target:
    name: acr-secret
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {
            "auths": {
              "{{ .acrServer }}": {
                "username": "{{ .acrUsername }}",
                "password": "{{ .acrPassword }}",
                "auth": "{{ printf "%s:%s" .acrUsername .acrPassword | b64enc }}"
              }
            }
          }
  data:
    - secretKey: acrServer
      remoteRef:
        key: acr-server
    - secretKey: acrUsername
      remoteRef:
        key: acr-username
    - secretKey: acrPassword
      remoteRef:
        key: acr-password
