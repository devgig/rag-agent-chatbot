# KEDA ScaledObject for Backend Autoscaling
# ==========================================
# Scales backend pods based on CPU utilization and Istio request metrics.
# Min: 1 pod, Max: 5 pods (adjust based on your cluster capacity)
#
# Scaling triggers:
# 1. CPU utilization > 70%
# 2. Istio request rate (if Prometheus metrics available)

apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: rag-agent-backend-scaler
  namespace: rag-agent-dev
spec:
  scaleTargetRef:
    name: rag-agent-backend
  minReplicaCount: 1
  maxReplicaCount: 5
  pollingInterval: 15  # Check every 15 seconds
  cooldownPeriod: 60   # Wait 60s before scaling down

  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleDown:
          stabilizationWindowSeconds: 120  # Wait 2 min before scaling down
          policies:
            - type: Percent
              value: 25
              periodSeconds: 60
        scaleUp:
          stabilizationWindowSeconds: 0  # Scale up immediately
          policies:
            - type: Pods
              value: 2
              periodSeconds: 30

  triggers:
    # CPU-based scaling
    - type: cpu
      metricType: Utilization
      metadata:
        value: "70"  # Scale when CPU > 70%

    # Memory-based scaling (optional)
    - type: memory
      metricType: Utilization
      metadata:
        value: "80"  # Scale when Memory > 80%

    # Prometheus-based scaling (Istio metrics)
    # Uncomment if you have Prometheus with Istio metrics
    # - type: prometheus
    #   metadata:
    #     serverAddress: http://prometheus.monitoring.svc.cluster.local:9090
    #     metricName: istio_requests_total
    #     threshold: "100"
    #     query: |
    #       sum(rate(istio_requests_total{
    #         destination_service_name="rag-agent-backend",
    #         reporter="destination"
    #       }[1m]))
