apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-external-secret
  annotations:
    "external-secrets.io/delete-on-resource-deletion": "true"
spec:
  refreshInterval: "0"
  secretStoreRef:
    name: azure-keyvault-secret-store
    kind: ClusterSecretStore
  target:
    name: postgres-credentials
    creationPolicy: Owner
    template:
      mergePolicy: Merge
      data:
        database: "chatbot"
        username: "chatbot_user"
  data:
    - secretKey: password
      remoteRef:
        key: multi-agent-postgresql-password
