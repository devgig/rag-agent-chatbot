# Waypoint Proxy for L7 Features in Ambient Mesh
# ===============================================
# Required for L7 routing, consistent hashing, and observability.
# Without this, only L4 (ztunnel) features are available.
#
# This waypoint handles traffic for the rag-agent-backend service.

apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: backend-waypoint
  namespace: rag-agent
  labels:
    istio.io/waypoint-for: service
spec:
  gatewayClassName: istio-waypoint
  listeners:
    - name: mesh
      port: 15008
      protocol: HBONE
