apiVersion: v1
kind: Service
metadata:
  name: multi-agent-backend
  labels:
    app: multi-agent-backend
    istio.io/use-waypoint: backend-waypoint  # Route through L7 waypoint
spec:
  selector:
    app: multi-agent-backend
  ports:
  - port: 8000
    targetPort: 8000
    name: http
  type: LoadBalancer
