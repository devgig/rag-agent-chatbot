apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: rag-agent-backend

resources:
  - deployment.yaml
  - service.yaml
  - postgres-external-secret.yaml
  - acr-external-secret.yaml
  - httproute.yaml
  # KEDA autoscaling
  - keda-scaledobject.yaml
  # ExternalName alias so backend resolves qwen35:8000 → qwen35.llm.svc
  - qwen35-externalname-service.yaml
  # Embedding service (runs on CPU in rag-agent namespace)
  - qwen3-embedding-deployment.yaml
  - qwen3-embedding-service.yaml

patches:
  - target:
      kind: Deployment
      name: rag-agent-backend
    path: image-patch.yaml
  - target:
      kind: Deployment
      name: qwen3-embedding
    path: qwen3-embedding-image-patch.yaml

labels:
- includeSelectors: true
  pairs:
    app: rag-agent-backend
    component: backend
