apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: rag-agent-backend

resources:
  - deployment.yaml
  - service.yaml
  - postgres-external-secret.yaml
  - acr-external-secret.yaml
  - httproute.yaml
  # KEDA autoscaling
  - keda-scaledobject.yaml
  # ExternalName alias so backend resolves nemotron-nano:8000 → nemotron-nano.llm.svc
  - nemotron-nano-externalname-service.yaml

patches:
  - target:
      kind: Deployment
      name: rag-agent-backend
    path: image-patch.yaml

labels:
- includeSelectors: false
  pairs:
    component: backend
