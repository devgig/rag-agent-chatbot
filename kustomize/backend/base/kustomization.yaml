apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: rag-agent-backend

resources:
  - deployment.yaml
  - service.yaml
  - postgres-external-secret.yaml
  - acr-external-secret.yaml
  - httproute.yaml
  # Istio Ambient Mesh L7 resources
  - istio-waypoint.yaml
  - istio-destination-rule.yaml
  - istio-virtual-service.yaml
  # Istio Ambient Mesh security — JWT enforcement moved to ingress gateway
  # (see kustomize/gateway/base/istio-request-authentication.yaml)
  # Waypoint JWT caused intermittent CORS failures: cold JWKS cache returns 503
  # without CORS headers, which browsers report as CORS errors.
  # - istio-request-authentication.yaml   (deprecated, kept for reference)
  # - istio-authorization-policy.yaml     (deprecated, kept for reference)
  # KEDA autoscaling
  - keda-scaledobject.yaml

patches:
  - target:
      kind: Deployment
      name: rag-agent-backend
    path: image-patch.yaml

labels:
- includeSelectors: true
  pairs:
    app: rag-agent-backend
    component: backend
