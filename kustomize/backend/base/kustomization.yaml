apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: rag-agent-backend

resources:
  - deployment.yaml
  - service.yaml
  - postgres-external-secret.yaml
  - acr-external-secret.yaml
  - httproute.yaml
  # Waypoint proxy removed — HBONE cold-connection bug causes persistent 503s
  # on initial page load (see https://github.com/istio/istio/issues/XXXXX).
  # CORS: EnvoyFilter + FastAPI middleware. Retries: frontend apiFetch.
  # - istio-waypoint.yaml
  # - istio-destination-rule.yaml
  # - istio-virtual-service.yaml
  # KEDA autoscaling
  - keda-scaledobject.yaml

patches:
  - target:
      kind: Deployment
      name: rag-agent-backend
    path: image-patch.yaml

labels:
- includeSelectors: true
  pairs:
    app: rag-agent-backend
    component: backend
