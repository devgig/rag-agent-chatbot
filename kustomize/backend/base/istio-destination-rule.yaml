# DestinationRule for WebSocket Connection Affinity
# =================================================
# Ensures WebSocket connections stick to the same backend pod
# using consistent hashing based on the chatId query parameter.
#
# Key settings:
# - consistentHash: Routes same session to same pod
# - h2UpgradePolicy: DO_NOT_UPGRADE keeps HTTP/1.1 for WebSocket
# - Connection pool tuned for long-lived WebSocket connections

apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: rag-agent-backend-ws
  namespace: rag-agent
spec:
  host: rag-agent-backend
  trafficPolicy:
    loadBalancer:
      consistentHash:
        httpQueryParameterName: chatId  # WebSocket URL includes ?chatId=xxx
    connectionPool:
      http:
        h2UpgradePolicy: DO_NOT_UPGRADE  # Keep HTTP/1.1 for WebSocket upgrade
        http1MaxPendingRequests: 10000
        http2MaxRequests: 10000
      tcp:
        maxConnections: 10000
        connectTimeout: 10s
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
