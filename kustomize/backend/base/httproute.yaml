apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: rag-agent-backend-httproute
spec:
  hostnames:
    - sparkchat.bytecourier.local
    - sparkchat.bytecourier.com
  parentRefs:
    - name: rag-agent-gateway
      namespace: istio-ingress
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/backend-svc
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: rag-agent-backend
          port: 8000
