apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: rag-agent-backend-httproute
spec:
  hostnames:
    - sparkbackend.bytecourier.local
    - sparkbackend.bytecourier.com
  parentRefs:
    - name: multi-agent-gateway
      namespace: istio-ingress-dev
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: rag-agent-backend
          port: 8000
