# VirtualService for Backend Routing (Ingress Gateway + Waypoint)
# ===============================================================
# Bound to both the ingress gateway and mesh (waypoint) so retries,
# timeouts, and CORS apply at every L7 hop.
#
# Key settings:
# - timeout omitted on WebSocket route to disable it for long-lived connections
# - retries: 0 for WebSocket (client handles reconnection)
# - retries on HTTP routes catch transient 503s at the ingress gateway
# - corsPolicy on HTTP routes for browser cross-origin requests
#
# Replaces the backend HTTPRoute — all ingress routing is here.

apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: rag-agent-backend-vs
  namespace: rag-agent
spec:
  hosts:
    - rag-agent-backend
    - sparkbackend.bytecourier.local
    - sparkbackend.bytecourier.com
  gateways:
    - mesh                                # waypoint proxy
    - istio-ingress/rag-agent-gateway     # ingress gateway
  http:
    # WebSocket routes - no timeout, no retries
    - match:
        - uri:
            prefix: /ws
        - headers:
            upgrade:
              exact: websocket
      route:
        - destination:
            host: rag-agent-backend
            port:
              number: 8000
      retries:
        attempts: 0  # Client handles reconnection
    # Regular HTTP routes
    - match:
        - uri:
            prefix: /
      route:
        - destination:
            host: rag-agent-backend
            port:
              number: 8000
      timeout: 300s  # 5 min timeout for LLM requests
      retries:
        attempts: 3
        perTryTimeout: 3s
        retryOn: 5xx,reset,connect-failure
      corsPolicy:
        allowOrigins:
          - exact: "http://localhost:3000"
          - exact: "http://sparkchat.bytecourier.local"
          - exact: "http://sparkchat.bytecourier.com"
          - exact: "https://sparkchat.bytecourier.com"
        allowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        allowHeaders:
          - authorization
          - content-type
        allowCredentials: true
        maxAge: "86400s"
