apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: multi-agent-backend-dev

namespace: multi-agent-dev

resources:
  - namespace.yaml
  - ../../base

labels:
- includeSelectors: false
  pairs:
    environment: dev

replicas:
  - name: multi-agent-backend
    count: 1

configMapGenerator:
- name: backend-config
  literals:
  - MODELS=gpt-oss-120b
  - LOG_LEVEL=DEBUG
