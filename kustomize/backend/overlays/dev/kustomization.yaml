apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: rag-agent-backend-dev

namespace: rag-agent

resources:
  - namespace.yaml
  - ../../base

labels:
- includeSelectors: false
  pairs:
    environment: dev

replicas:
  - name: rag-agent-backend
    count: 1

configMapGenerator:
- name: backend-config
  literals:
  - MODELS=nemotron-70b
  - LOG_LEVEL=DEBUG
