resources:
- ../../base

namespace: multi-agent-dev

namePrefix: dev-

patches:
- path: dev-patches.yaml

secretGenerator:
- name: postgres-credentials
  literals:
  - username=chatbot_user
  - password=chatbot_password_dev

configMapGenerator:
- name: backend-config
  literals:
  - MODELS=gpt-oss-120b
  - LOG_LEVEL=DEBUG

replicas:
- name: multi-agent-frontend
  count: 1
- name: multi-agent-backend
  count: 1
