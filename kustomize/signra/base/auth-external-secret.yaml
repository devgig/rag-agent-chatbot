apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: auth-external-secret
  annotations:
    "external-secrets.io/delete-on-resource-deletion": "true"
spec:
  refreshInterval: "0"
  secretStoreRef:
    name: azure-keyvault-secret-store
    kind: ClusterSecretStore
  target:
    name: auth-credentials
    creationPolicy: Owner
  data:
    - secretKey: allowed-emails
      remoteRef:
        key: rag-agent-auth-users
    - secretKey: jwt-secret
      remoteRef:
        key: rag-agent-jwt-secret
    - secretKey: jwt-private-key
      remoteRef:
        key: rag-agent-jwt-private-key
    - secretKey: google-client-id
      remoteRef:
        key: google-client-id
