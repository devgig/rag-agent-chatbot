apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: signra

resources:
  - deployment.yaml
  - service.yaml
  - httproute.yaml
  - acr-external-secret.yaml
  - auth-external-secret.yaml
  - postgres-external-secret.yaml

patches:
  - target:
      kind: Deployment
      name: signra
    path: image-patch.yaml

labels:
- includeSelectors: true
  pairs:
    app: signra
    component: auth
