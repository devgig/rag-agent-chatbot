apiVersion: apps/v1
kind: Deployment
metadata:
  name: signra
  labels:
    app: signra
    component: auth
spec:
  replicas: 1
  progressDeadlineSeconds: 300
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: signra
  template:
    metadata:
      labels:
        app: signra
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: NotIn
                values:
                - storage01
                - storage02
                - storage03
      imagePullSecrets:
      - name: acr-secret
      containers:
      - name: signra
        image: signra:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: POSTGRES_HOST
          value: "postgresql.postgres-system.svc.cluster.local"
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: database
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: username
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: password
        - name: AUTH_ALLOWED_EMAILS
          valueFrom:
            secretKeyRef:
              name: auth-credentials
              key: allowed-emails
        - name: JWT_PRIVATE_KEY
          valueFrom:
            secretKeyRef:
              name: auth-credentials
              key: jwt-private-key
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        startupProbe:
          exec:
            command:
            - /app/.venv/bin/python
            - -c
            - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 12
        livenessProbe:
          exec:
            command:
            - /app/.venv/bin/python
            - -c
            - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"
          periodSeconds: 60
          timeoutSeconds: 10
          failureThreshold: 5
        readinessProbe:
          exec:
            command:
            - /app/.venv/bin/python
            - -c
            - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 3
