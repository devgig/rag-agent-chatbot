parameters:
  - name: poolName
    type: string
    default: 'Default'
  - name: imageRepository
    type: string
    default: 'multi-agent-chatbot/backend'
  - name: dockerfilePath
    type: string
    default: 'assets/backend/Dockerfile'
  - name: manifestPath
    type: string
    default: 'kustomize/base/backend'
  - name: tag
    type: string
    default: '$(Build.BuildId)'
  - name: containerRegistry
    type: string
    default: 'your-registry.azurecr.io'

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - assets/backend/*
      - kustomize/base/backend/*

pr:
  branches:
    include:
      - main
  paths:
    include:
      - assets/backend/*

stages:
- stage: BuildAndTest
  displayName: Build and Test Backend
  pool:
    name: ${{ parameters.poolName }}
  jobs:
  - job: Build
    displayName: Build and test backend
    steps:
      - task: UsePythonVersion@0
        displayName: Install Python
        inputs:
          versionSpec: '3.12'
          addToPath: true

      - task: Bash@3
        displayName: Install uv
        inputs:
          targetType: 'inline'
          script: |
            curl -LsSf https://astral.sh/uv/install.sh | sh
            echo "##vso[task.prependpath]$HOME/.local/bin"

      - task: Bash@3
        displayName: Install dependencies
        inputs:
          targetType: 'inline'
          workingDirectory: '$(Build.SourcesDirectory)/assets/backend'
          script: |
            uv sync

      - task: Bash@3
        displayName: Run linting
        inputs:
          targetType: 'inline'
          workingDirectory: '$(Build.SourcesDirectory)/assets/backend'
          script: |
            uv run ruff check . || echo "Ruff not configured"

      - task: Bash@3
        displayName: Run type checking
        inputs:
          targetType: 'inline'
          workingDirectory: '$(Build.SourcesDirectory)/assets/backend'
          script: |
            uv run mypy . || echo "Mypy not configured"

      - task: Bash@3
        displayName: Run tests
        inputs:
          targetType: 'inline'
          workingDirectory: '$(Build.SourcesDirectory)/assets/backend'
          script: |
            uv run pytest || echo "Tests not configured"

      - task: PublishTestResults@2
        condition: succeededOrFailed()
        inputs:
          testResultsFormat: 'JUnit'
          testResultsFiles: '**/test-results.xml'
          failTaskOnFailedTests: false

- stage: CreateImageAndPublish
  displayName: Create image and Publish
  dependsOn: BuildAndTest
  condition: and(succeeded(), in(variables['Build.Reason'], 'BatchedCI', 'IndividualCI', 'Manual'), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  pool:
    name: ${{ parameters.poolName }}
  jobs:
  - job: BuildAndPush
    displayName: Build image and Push to ACR
    steps:
      - checkout: self

      - task: Docker@2
        displayName: Build and push an image to ACR
        inputs:
          containerRegistry: '$(containerRegistry)'
          repository: '${{ parameters.imageRepository }}'
          command: buildAndPush
          dockerfile: ./${{ parameters.dockerfilePath }}
          buildContext: '$(Build.SourcesDirectory)/assets/backend'
          tags: |
            ${{ parameters.tag }}
            latest

  - job: PublishManifest
    displayName: Publish manifests
    dependsOn: BuildAndPush
    steps:
      - task: Bash@3
        displayName: Update image in base manifests
        inputs:
          targetType: 'inline'
          script: |
            cd ${{ parameters.manifestPath }}/app
            cat <<EOF >image_patch.yaml
            - op: replace
              path: /spec/template/spec/containers/0/image
              value: ${{ parameters.containerRegistry }}/${{ parameters.imageRepository }}:${{ parameters.tag }}
            EOF

      - task: Bash@3
        displayName: Generate manifests for overlays
        condition: and(in(variables['Build.Reason'], 'BatchedCI', 'IndividualCI', 'Manual'), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
        inputs:
          targetType: 'inline'
          script: |
            mkdir -p manifests

            # Generate manifest for dev
            if [ -d "./kustomize/overlays/dev" ]; then
              kubectl kustomize ./kustomize/overlays/dev > ./manifests/backend-dev-workloads.yaml
            else
              echo "dev overlay doesn't exist; skipping"
            fi

            # Generate manifest for prod
            if [ -d "./kustomize/overlays/prod" ]; then
              kubectl kustomize ./kustomize/overlays/prod > ./manifests/backend-prod-workloads.yaml
            else
              echo "prod overlay doesn't exist; skipping"
            fi

      - publish: 'manifests'
        artifact: backend-manifests
        displayName: Publish manifests artifact
