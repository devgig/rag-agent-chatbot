trigger:
  branches:
    include:
      - main
  paths:
    include:
      - assets/backend/**
      - kustomize/backend/**
    exclude:
      - assets/embedding/**
      - kustomize/embedding/**

pr:
  branches:
    include:
      - main
  paths:
    include:
      - assets/backend/**
      - kustomize/backend/**
    exclude:
      - assets/embedding/**
      - kustomize/embedding/**

resources:
- repo: self

variables:
  system.debug: false
  imageRepository: 'rag-agent-chatbot-backend'
  containerRegistry: 'acr-bytecourier'
  containerRegistryUrl: 'bytecourier.azurecr.io'
  kubernetesServiceConnection: 'k3s-cluster'
  environment: 'K3s'
  dockerfilePath: './assets/backend/Dockerfile'
  manifestPath: 'kustomize/backend/base'
  tag: '$(Build.SourceVersion)'
  poolName: '$(buildAgentPool)'
  base_path: '$(Build.SourceBranchName)'
  source_branch_name: '$(Build.SourceBranchName)'
  imagePullSecret: 'acr-secret'
  namespace: 'rag-agent'

stages:
- stage: BuildAndTest
  displayName: Build and Test Backend
  pool:
    name: $(poolName)
  jobs:
  - job: Build
    displayName: Build and test backend
    steps:
      - task: Bash@3
        displayName: Install uv
        inputs:
          targetType: 'inline'
          script: |
            curl -LsSf https://astral.sh/uv/install.sh | sh
            echo "##vso[task.prependpath]$HOME/.local/bin"

      - task: Bash@3
        displayName: Install dependencies
        inputs:
          targetType: 'inline'
          workingDirectory: '$(Build.SourcesDirectory)/assets/backend'
          script: |
            uv sync

      - task: Bash@3
        displayName: Run linting
        inputs:
          targetType: 'inline'
          workingDirectory: '$(Build.SourcesDirectory)/assets/backend'
          script: |
            uv run ruff check . || echo "Ruff not configured"

      - task: Bash@3
        displayName: Run type checking
        inputs:
          targetType: 'inline'
          workingDirectory: '$(Build.SourcesDirectory)/assets/backend'
          script: |
            uv run mypy . || echo "Mypy not configured"

      - task: Bash@3
        displayName: Run tests
        inputs:
          targetType: 'inline'
          workingDirectory: '$(Build.SourcesDirectory)/assets/backend'
          script: |
            uv run pytest || echo "Tests not configured"

      - task: PublishTestResults@2
        condition: succeededOrFailed()
        inputs:
          testResultsFormat: 'JUnit'
          testResultsFiles: '**/test-results.xml'
          failTaskOnFailedTests: false

- stage: CreateImageAndPublish
  displayName: Create image and Publish
  dependsOn: BuildAndTest
  condition: and(succeeded(), in(variables['Build.Reason'], 'BatchedCI', 'IndividualCI', 'Manual'), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  pool:
    name: $(poolName)
  jobs:
  - job: BuildAndPush
    displayName: Build image and Push to ACR
    steps:
      - checkout: self

      - task: Docker@2
        displayName: Build ARM64 image
        inputs:
          containerRegistry: '$(containerRegistry)'
          repository: '$(imageRepository)'
          command: build
          dockerfile: $(dockerfilePath)
          buildContext: '$(Build.SourcesDirectory)/assets/backend'
          arguments: '--platform linux/arm64'
          tags: |
            $(tag)
            latest

      - task: Docker@2
        displayName: Push image to ACR
        inputs:
          containerRegistry: '$(containerRegistry)'
          repository: '$(imageRepository)'
          command: push
          tags: |
            $(tag)
            latest

  - job: PublishManifest
    displayName: Publish manifests
    dependsOn: BuildAndPush
    steps:
      - task: Bash@3
        displayName: Update image in manifests
        inputs:
          targetType: 'inline'
          script: |
            cd kustomize/backend/base
            cat <<EOF >image-patch.yaml
            - op: replace
              path: /spec/template/spec/containers/0/image
              value: bytecourier.azurecr.io/$(imageRepository):$(tag)
            EOF

      - task: Bash@3
        displayName: Generate manifests for main branch
        inputs:
          targetType: 'inline'
          script: |
            mkdir manifests
            if [ -d "./kustomize/backend/overlays/dev" ]; then
              kubectl kustomize ./kustomize/backend/overlays/dev > ./manifests/$(imageRepository)-dev-workloads.yaml
            else
              echo "dev overlay doesn't exist; skipping"
            fi

            if [ -d "./kustomize/backend/overlays/prod" ]; then
              kubectl kustomize ./kustomize/backend/overlays/prod > ./manifests/$(imageRepository)-prod-workloads.yaml
            else
              echo "prod overlay doesn't exist; skipping"
            fi

      - publish: 'manifests'
        artifact: manifests
