trigger:
  branches:
    include:
      - main
  paths:
    include:
      - assets/backend/**
      - kustomize/backend/**

pr:
  branches:
    include:
      - main
  paths:
    include:
      - assets/backend/**
      - kustomize/backend/**

resources:
- repo: self

variables:
  system.debug: false
  imageRepository: 'multi-agent-chatbot-backend'
  containerRegistry: 'acr-bytecourier'
  kubernetesServiceConnection: 'k3s-cluster'
  environment: 'K3s'
  dockerfilePath: './assets/backend/Dockerfile'
  manifestPath: 'kustomize/backend/base'
  tag: '$(Build.SourceVersion)'
  poolName: '$(buildAgentPool)'
  base_path: '$(Build.SourceBranchName)'
  source_branch_name: '$(Build.SourceBranchName)'
  imagePullSecret: 'acr-secret'
  namespace: 'multi-agent-chatbot'
  sourceNamespace: 'bytecourier-apps'

stages:
- stage: BuildAndTest
  displayName: Build and Test Backend
  pool:
    name: $(poolName)
  jobs:
  - job: Build
    displayName: Build and test backend
    steps:
      - task: UsePythonVersion@0
        displayName: Install Python
        inputs:
          versionSpec: '3.12'
          addToPath: true

      - task: Bash@3
        displayName: Install uv
        inputs:
          targetType: 'inline'
          script: |
            curl -LsSf https://astral.sh/uv/install.sh | sh
            echo "##vso[task.prependpath]$HOME/.local/bin"

      - task: Bash@3
        displayName: Install dependencies
        inputs:
          targetType: 'inline'
          workingDirectory: '$(Build.SourcesDirectory)/assets/backend'
          script: |
            uv sync

      - task: Bash@3
        displayName: Run linting
        inputs:
          targetType: 'inline'
          workingDirectory: '$(Build.SourcesDirectory)/assets/backend'
          script: |
            uv run ruff check . || echo "Ruff not configured"

      - task: Bash@3
        displayName: Run type checking
        inputs:
          targetType: 'inline'
          workingDirectory: '$(Build.SourcesDirectory)/assets/backend'
          script: |
            uv run mypy . || echo "Mypy not configured"

      - task: Bash@3
        displayName: Run tests
        inputs:
          targetType: 'inline'
          workingDirectory: '$(Build.SourcesDirectory)/assets/backend'
          script: |
            uv run pytest || echo "Tests not configured"

      - task: PublishTestResults@2
        condition: succeededOrFailed()
        inputs:
          testResultsFormat: 'JUnit'
          testResultsFiles: '**/test-results.xml'
          failTaskOnFailedTests: false

- stage: CreateImageAndPublish
  displayName: Create image and Publish
  dependsOn: BuildAndTest
  condition: and(succeeded(), in(variables['Build.Reason'], 'BatchedCI', 'IndividualCI', 'Manual'), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  pool:
    name: $(poolName)
  jobs:
  - job: BuildAndPush
    displayName: Build image and Push to ACR
    steps:
      - checkout: self

      - task: Docker@2
        displayName: Build and push an image to ACR
        inputs:
          containerRegistry: '$(containerRegistry)'
          repository: '$(imageRepository)'
          command: buildAndPush
          dockerfile: $(dockerfilePath)
          buildContext: '$(Build.SourcesDirectory)/assets/backend'
          tags: |
            $(tag)
            latest

  - job: PublishManifest
    displayName: Publish manifests
    dependsOn: BuildAndPush
    steps:
      - task: Bash@3
        displayName: Create namespace and copy ACR secret
        inputs:
          targetType: 'inline'
          script: |
            # Create namespace if it doesn't exist
            kubectl create namespace $(namespace) --dry-run=client -o yaml | kubectl apply -f -

            # Copy ACR secret from source namespace to target namespace
            kubectl get secret $(imagePullSecret) --namespace=$(sourceNamespace) -oyaml | \
              grep -v '^\s*namespace:\s' | \
              kubectl apply --namespace=$(namespace) -f -

            echo "Namespace $(namespace) and ACR secret $(imagePullSecret) configured"

      - task: Bash@3
        displayName: Update image in base manifests
        inputs:
          targetType: 'inline'
          script: |
            cd $(manifestPath)
            cat <<EOF >image-patch.yaml
            - op: replace
              path: /spec/template/spec/containers/0/image
              value: $(containerRegistry)/$(imageRepository):$(tag)
            EOF

      - task: Bash@3
        displayName: Generate manifests for overlays
        condition: and(in(variables['Build.Reason'], 'BatchedCI', 'IndividualCI', 'Manual'), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
        inputs:
          targetType: 'inline'
          script: |
            mkdir -p manifests

            # Generate manifest for dev
            if [ -d "./kustomize/backend/overlays/dev" ]; then
              kubectl kustomize ./kustomize/backend/overlays/dev > ./manifests/backend-dev-workloads.yaml
            else
              echo "dev overlay doesn't exist; skipping"
            fi

      - publish: 'manifests'
        artifact: backend-manifests
        displayName: Publish manifests artifact
