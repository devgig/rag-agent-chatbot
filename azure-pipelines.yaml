parameters:
  - name: poolName
    type: string
    default: 'Default'
  - name: containerRegistry
    type: string
    default: 'your-registry.azurecr.io'
  - name: tag
    type: string
    default: '$(Build.BuildId)'

trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

stages:
- stage: BuildAndTestAll
  displayName: Build and Test All Components
  pool:
    name: ${{ parameters.poolName }}
  jobs:
  - job: TestFrontend
    displayName: Test Frontend
    steps:
      - task: NodeTool@0
        displayName: Install Node.js
        inputs:
          versionSpec: '20.x'

      - task: Bash@3
        displayName: Install dependencies
        inputs:
          targetType: 'inline'
          workingDirectory: '$(Build.SourcesDirectory)/assets/frontend'
          script: |
            npm ci

      - task: Bash@3
        displayName: Lint
        inputs:
          targetType: 'inline'
          workingDirectory: '$(Build.SourcesDirectory)/assets/frontend'
          script: |
            npm run lint || echo "Linting not configured"

      - task: Bash@3
        displayName: Run tests
        inputs:
          targetType: 'inline'
          workingDirectory: '$(Build.SourcesDirectory)/assets/frontend'
          script: |
            npm test || echo "Tests not configured"

      - task: Bash@3
        displayName: Build
        inputs:
          targetType: 'inline'
          workingDirectory: '$(Build.SourcesDirectory)/assets/frontend'
          script: |
            npm run build

  - job: TestBackend
    displayName: Test Backend
    steps:
      - task: UsePythonVersion@0
        displayName: Install Python
        inputs:
          versionSpec: '3.12'
          addToPath: true

      - task: Bash@3
        displayName: Install uv
        inputs:
          targetType: 'inline'
          script: |
            curl -LsSf https://astral.sh/uv/install.sh | sh
            echo "##vso[task.prependpath]$HOME/.local/bin"

      - task: Bash@3
        displayName: Install dependencies
        inputs:
          targetType: 'inline'
          workingDirectory: '$(Build.SourcesDirectory)/assets/backend'
          script: |
            uv sync

      - task: Bash@3
        displayName: Run linting
        inputs:
          targetType: 'inline'
          workingDirectory: '$(Build.SourcesDirectory)/assets/backend'
          script: |
            uv run ruff check . || echo "Ruff not configured"

      - task: Bash@3
        displayName: Run tests
        inputs:
          targetType: 'inline'
          workingDirectory: '$(Build.SourcesDirectory)/assets/backend'
          script: |
            uv run pytest || echo "Tests not configured"

      - task: PublishTestResults@2
        condition: succeededOrFailed()
        inputs:
          testResultsFormat: 'JUnit'
          testResultsFiles: '**/test-results.xml'
          failTaskOnFailedTests: false

- stage: BuildImages
  displayName: Build and Push Container Images
  dependsOn: BuildAndTestAll
  condition: and(succeeded(), in(variables['Build.Reason'], 'BatchedCI', 'IndividualCI', 'Manual'), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  pool:
    name: ${{ parameters.poolName }}
  jobs:
  - job: BuildFrontendImage
    displayName: Build Frontend Image
    steps:
      - checkout: self

      - task: Docker@2
        displayName: Build and push frontend image
        inputs:
          containerRegistry: '$(containerRegistry)'
          repository: 'multi-agent-chatbot/frontend'
          command: buildAndPush
          dockerfile: './assets/frontend/Dockerfile'
          buildContext: '$(Build.SourcesDirectory)/assets/frontend'
          tags: |
            ${{ parameters.tag }}
            latest

  - job: BuildBackendImage
    displayName: Build Backend Image
    steps:
      - checkout: self

      - task: Docker@2
        displayName: Build and push backend image
        inputs:
          containerRegistry: '$(containerRegistry)'
          repository: 'multi-agent-chatbot/backend'
          command: buildAndPush
          dockerfile: './assets/backend/Dockerfile'
          buildContext: '$(Build.SourcesDirectory)/assets/backend'
          tags: |
            ${{ parameters.tag }}
            latest

- stage: PublishManifests
  displayName: Publish Kubernetes Manifests
  dependsOn: BuildImages
  condition: succeeded()
  pool:
    name: ${{ parameters.poolName }}
  jobs:
  - job: GenerateManifests
    displayName: Generate and Publish Manifests
    steps:
      - task: Bash@3
        displayName: Update image tags in kustomize
        inputs:
          targetType: 'inline'
          script: |
            # Update frontend image
            cd kustomize/frontend/base
            cat <<EOF >image-patch.yaml
            - op: replace
              path: /spec/template/spec/containers/0/image
              value: ${{ parameters.containerRegistry }}/multi-agent-chatbot/frontend:${{ parameters.tag }}
            EOF

            # Update backend image
            cd ../../backend/base
            cat <<EOF >image-patch.yaml
            - op: replace
              path: /spec/template/spec/containers/0/image
              value: ${{ parameters.containerRegistry }}/multi-agent-chatbot/backend:${{ parameters.tag }}
            EOF

      - task: Bash@3
        displayName: Generate manifests for all overlays
        inputs:
          targetType: 'inline'
          script: |
            mkdir -p manifests

            # Generate dev manifests for frontend
            if [ -d "./kustomize/frontend/overlays/dev" ]; then
              kubectl kustomize ./kustomize/frontend/overlays/dev > ./manifests/frontend-dev-workloads.yaml
              echo "Frontend dev manifests generated"
            else
              echo "frontend dev overlay doesn't exist; skipping"
            fi

            # Generate dev manifests for backend
            if [ -d "./kustomize/backend/overlays/dev" ]; then
              kubectl kustomize ./kustomize/backend/overlays/dev > ./manifests/backend-dev-workloads.yaml
              echo "Backend dev manifests generated"
            else
              echo "backend dev overlay doesn't exist; skipping"
            fi

            # Generate dev manifests for database
            if [ -d "./kustomize/database/overlays/dev" ]; then
              kubectl kustomize ./kustomize/database/overlays/dev > ./manifests/database-dev-workloads.yaml
              echo "Database dev manifests generated"
            else
              echo "database dev overlay doesn't exist; skipping"
            fi

      - publish: 'manifests'
        artifact: k8s-manifests
        displayName: Publish all manifests
