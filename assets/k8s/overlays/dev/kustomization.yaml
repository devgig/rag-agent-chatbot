apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: multi-agent-dev

resources:
  - ../../base

configMapGenerator:
  - name: frontend-env
    behavior: replace
    literals:
      - NEXT_PUBLIC_API_URL=http://backend.bytecourier.local:8000
      - NEXT_PUBLIC_WS_URL=ws://backend.bytecourier.local:8000

# Patch the frontend deployment to use the ConfigMap
patches:
  - target:
      kind: Deployment
      name: multi-agent-frontend
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/envFrom
        value:
          - configMapRef:
              name: frontend-env
