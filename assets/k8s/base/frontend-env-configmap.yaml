apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-env
data:
  # Backend API URL for browser requests (HTTP and WebSocket)
  # Format: http://backend.example.com:8000 or https://backend.example.com
  NEXT_PUBLIC_API_URL: ""
  # WebSocket URL (optional, derived from NEXT_PUBLIC_API_URL if not set)
  # Format: ws://backend.example.com:8000 or wss://backend.example.com
  NEXT_PUBLIC_WS_URL: ""
