# HTTPRoute for multi-agent frontend
# Routes traffic from Istio Gateway to the frontend service
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: multi-agent-frontend-route
spec:
  parentRefs:
  - name: multi-agent-gateway
    namespace: istio-ingress-dev
  hostnames:
  - "frontend.bytecourier.local"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: multi-agent-frontend
      port: 3000
