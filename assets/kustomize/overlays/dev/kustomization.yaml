apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: multi-agent-dev

resources:
  - ../../base

# Image tags are set by Azure DevOps pipeline using:
# kustomize edit set image bytecourier.azurecr.io/multi-agent-chatbot-frontend:TAG
# kustomize edit set image bytecourier.azurecr.io/multi-agent-chatbot-backend:TAG
images:
  - name: bytecourier.azurecr.io/multi-agent-chatbot-frontend
    newTag: latest
  - name: bytecourier.azurecr.io/multi-agent-chatbot-backend
    newTag: latest

labels:
  - pairs:
      environment: dev
    includeSelectors: false
