# Istio Gateway for multi-agent chatbot
# This is deployed to istio-ingress-dev namespace
# The Gateway gets an external IP from the LoadBalancer
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: multi-agent-gateway
  namespace: istio-ingress-dev
spec:
  gatewayClassName: istio
  listeners:
  - name: frontend
    port: 80
    protocol: HTTP
    hostname: "frontend.bytecourier.local"
    allowedRoutes:
      namespaces:
        from: All
  - name: backend
    port: 80
    protocol: HTTP
    hostname: "backend.bytecourier.local"
    allowedRoutes:
      namespaces:
        from: All
