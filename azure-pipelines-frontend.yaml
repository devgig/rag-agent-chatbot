trigger:
  branches:
    include:
      - main
  paths:
    include:
      - assets/frontend/**
      - kustomize/frontend/**

pr:
  branches:
    include:
      - main
  paths:
    include:
      - assets/frontend/**
      - kustomize/frontend/**

resources:
- repo: self

variables:
  system.debug: false
  NODE_ENV: production
  CI: true
  imageRepository: 'multi-agent-chatbot-frontend'
  containerRegistry: 'acr-bytecourier'
  containerRegistryUrl: 'bytecourier.azurecr.io'
  kubernetesServiceConnection: 'k3s-cluster'
  environment: 'K3s'
  dockerfilePath: './assets/frontend/Dockerfile'
  manifestPath: 'kustomize/frontend/base'
  tag: '$(Build.SourceVersion)'
  poolName: '$(buildAgentPool)'
  base_path: '$(Build.SourceBranchName)'
  source_branch_name: '$(Build.SourceBranchName)'
  imagePullSecret: 'acr-secret'
  namespace: 'multi-agent-dev'
  sourceNamespace: 'bytecourier-apps'

stages:
- stage: BuildAndTest
  displayName: Build and Test Frontend
  pool:
    name: $(poolName)
  jobs:
  - job: Build
    displayName: Build and test frontend
    steps:
      # - task: NodeTool@0
      #   displayName: Install Node.js
      #   inputs:
      #     versionSpec: '20.x'

      - task: Bash@3
        displayName: Install dependencies
        inputs:
          targetType: 'inline'
          workingDirectory: '$(Build.SourcesDirectory)/assets/frontend'
          script: |
            npm ci --include=dev

      - task: Bash@3
        displayName: Lint
        inputs:
          targetType: 'inline'
          workingDirectory: '$(Build.SourcesDirectory)/assets/frontend'
          script: |
            npm run lint || echo "Linting not configured"

      - task: Bash@3
        displayName: Run tests
        inputs:
          targetType: 'inline'
          workingDirectory: '$(Build.SourcesDirectory)/assets/frontend'
          script: |
            npm test || echo "Tests not configured"

      - task: Bash@3
        displayName: Build
        inputs:
          targetType: 'inline'
          workingDirectory: '$(Build.SourcesDirectory)/assets/frontend'
          script: |
            npm run build

- stage: CreateImageAndPublish
  displayName: Create image and Publish
  dependsOn: BuildAndTest
  condition: and(succeeded(), in(variables['Build.Reason'], 'BatchedCI', 'IndividualCI', 'Manual'), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  pool:
    name: $(poolName)
  jobs:
  - job: BuildAndPush
    displayName: Build image and Push to ACR
    steps:
      - checkout: self

      - task: Docker@2
        displayName: Build and push an image to ACR
        inputs:
          containerRegistry: '$(containerRegistry)'
          repository: '$(imageRepository)'
          command: buildAndPush
          dockerfile: $(dockerfilePath)
          buildContext: '$(Build.SourcesDirectory)/assets/frontend'
          tags: |
            $(tag)
            latest

  - job: PublishManifest
    displayName: Publish manifests
    dependsOn: BuildAndPush
    steps:
      - task: Bash@3
        displayName: Update image in manifests
        inputs:
          targetType: 'inline'
          script: |
            cd kustomize/frontend/base
            cat <<EOF >image-patch.yaml
            - op: replace
              path: /spec/template/spec/containers/0/image
              value: bytecourier.azurecr.io/$(imageRepository):$(tag)
            EOF

      - task: Bash@3
        displayName: Generate manifests for main branch
        inputs:
          targetType: 'inline'
          script: |
            mkdir manifests
            if [ -d "./kustomize/frontend/overlays/dev" ]; then
              kubectl kustomize ./kustomize/frontend/overlays/dev > ./manifests/$(imageRepository)-dev-workloads.yaml
            else
              echo "dev overlay doesn't exist; skipping"
            fi

            if [ -d "./kustomize/frontend/overlays/prod" ]; then
              kubectl kustomize ./kustomize/frontend/overlays/prod > ./manifests/$(imageRepository)-prod-workloads.yaml
            else
              echo "prod overlay doesn't exist; skipping"
            fi

      - publish: 'manifests'
        artifact: manifests
