trigger:
  branches:
    include:
      - main
  paths:
    include:
      - assets/frontend/**
      - kustomize/frontend/**

pr:
  branches:
    include:
      - main
  paths:
    include:
      - assets/frontend/**
      - kustomize/frontend/**

resources:
- repo: self

variables:
  system.debug: false
  NODE_ENV: production
  CI: true
  imageRepository: 'multi-agent-chatbot-frontend'
  containerRegistry: 'acr-bytecourier'
  kubernetesServiceConnection: 'k3s-cluster'
  environment: 'K3s'
  dockerfilePath: './assets/frontend/Dockerfile'
  manifestPath: 'kustomize/frontend/base'
  tag: '$(Build.SourceVersion)'
  poolName: '$(buildAgentPool)'
  base_path: '$(Build.SourceBranchName)'
  source_branch_name: '$(Build.SourceBranchName)'
  imagePullSecret: 'acr-secret'
  namespace: 'multi-agent-chatbot'
  sourceNamespace: 'bytecourier-apps'

stages:
- stage: BuildAndTest
  displayName: Build and Test Frontend
  pool:
    name: $(poolName)
  jobs:
  - job: Build
    displayName: Build and test frontend
    steps:
      # - task: NodeTool@0
      #   displayName: Install Node.js
      #   inputs:
      #     versionSpec: '20.x'

      - task: Bash@3
        displayName: Install dependencies
        inputs:
          targetType: 'inline'
          workingDirectory: '$(Build.SourcesDirectory)/assets/frontend'
          script: |
            npm ci

      - task: Bash@3
        displayName: Lint
        inputs:
          targetType: 'inline'
          workingDirectory: '$(Build.SourcesDirectory)/assets/frontend'
          script: |
            npm run lint || echo "Linting not configured"

      - task: Bash@3
        displayName: Run tests
        inputs:
          targetType: 'inline'
          workingDirectory: '$(Build.SourcesDirectory)/assets/frontend'
          script: |
            npm test || echo "Tests not configured"

      - task: Bash@3
        displayName: Build
        inputs:
          targetType: 'inline'
          workingDirectory: '$(Build.SourcesDirectory)/assets/frontend'
          script: |
            npm run build

- stage: CreateImageAndPublish
  displayName: Create image and Publish
  dependsOn: BuildAndTest
  condition: and(succeeded(), in(variables['Build.Reason'], 'BatchedCI', 'IndividualCI', 'Manual'), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  pool:
    name: $(poolName)
  jobs:
  - job: BuildAndPush
    displayName: Build image and Push to ACR
    steps:
      - checkout: self

      - task: Docker@2
        displayName: Build and push an image to ACR
        inputs:
          containerRegistry: '$(containerRegistry)'
          repository: '$(imageRepository)'
          command: buildAndPush
          dockerfile: $(dockerfilePath)
          buildContext: '$(Build.SourcesDirectory)/assets/frontend'
          tags: |
            $(tag)
            latest

  - job: PublishManifest
    displayName: Publish manifests
    dependsOn: BuildAndPush
    steps:
      - task: Bash@3
        displayName: Create namespace and copy ACR secret
        inputs:
          targetType: 'inline'
          script: |
            # Create namespace if it doesn't exist
            kubectl create namespace $(namespace) --dry-run=client -o yaml | kubectl apply -f -

            # Copy ACR secret from source namespace to target namespace
            kubectl get secret $(imagePullSecret) --namespace=$(sourceNamespace) -oyaml | \
              grep -v '^\s*namespace:\s' | \
              kubectl apply --namespace=$(namespace) -f -

            echo "Namespace $(namespace) and ACR secret $(imagePullSecret) configured"

      - task: Bash@3
        displayName: Update image in base manifests
        inputs:
          targetType: 'inline'
          script: |
            cd $(manifestPath)
            cat <<EOF >image-patch.yaml
            - op: replace
              path: /spec/template/spec/containers/0/image
              value: $(containerRegistry)/$(imageRepository):$(tag)
            EOF

      - task: Bash@3
        displayName: Generate manifests for overlays
        condition: and(in(variables['Build.Reason'], 'BatchedCI', 'IndividualCI', 'Manual'), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
        inputs:
          targetType: 'inline'
          script: |
            mkdir -p manifests

            # Generate manifest for dev
            if [ -d "./kustomize/frontend/overlays/dev" ]; then
              kubectl kustomize ./kustomize/frontend/overlays/dev > ./manifests/frontend-dev-workloads.yaml
            else
              echo "dev overlay doesn't exist; skipping"
            fi

      - publish: 'manifests'
        artifact: frontend-manifests
        displayName: Publish manifests artifact
